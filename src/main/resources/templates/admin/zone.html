<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Administration - Infrastructures</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin/zone.css}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>
</head>
<body class="bg-dark">
<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <nav class="admin-tabs">
        <a th:href="@{/admin/}" th:classappend="${activeTab == 'users'} ? 'active' : ''" class="tab-item">Gestion Personnel</a>
        <a th:href="@{/admin/zone}" th:classappend="${activeTab == 'zones' or activeTab == null} ? 'active' : ''" class="tab-item">Infrastructure & Modules</a>
    </nav>

    <section class="section-header">
        <h1>Infrastructure & Modules</h1>
        <p>Configuration avancée des infrastructures de la station.</p>
    </section>

    <div class="admin-table-container">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Désignation / Module</th>
                <th>Type / Description</th>
                <th>Statut Système</th>
                <th>Actions de Contrôle</th>
            </tr>
            </thead>
            <tbody>
            <th:block th:each="zone : ${zones}">
                <tr class="zone-row" th:id="'zone-row-' + ${zone.id}">
                    <td>
                        <strong th:text="${zone.name}"
                                contenteditable="true"
                                th:onblur="|updateZoneAjax(${zone.id}, this, 'name')|"
                                class="editable-text">ZONE NAME</strong>
                    </td>
                    <td>
                        <small th:text="${zone.description != null ? zone.description : 'Pas de description'}"
                               contenteditable="true"
                               th:onblur="|updateZoneAjax(${zone.id}, this, 'description')|"
                               class="editable-text"></small>
                    </td>
                    <td>
                        <span class="badge" th:text="${#lists.size(zone.devices)} + ' UNITÉS'"></span>
                    </td>
                    <td class="actions-cell">
                        <button type="button"
                                class="btn-action btn-add"
                                th:onclick="'document.getElementById(\'addDeviceModal-' + ${zone.id} + '\').style.display=\'flex\''">
                            ＋ Module
                        </button>
                        <button class="btn-action btn-delete"
                                th:onclick="'deleteZoneAjax(' + ${zone.id} + ')'">
                            Démanteler
                        </button>
                    </td>
                </tr>

                <tr th:each="device, iterStat : ${zone.devices}"
                    th:id="'device-row-' + ${device.id}"
                    class="device-row">
                    <td class="device-name-indent">
                        <span th:class="${iterStat.last} ? 'indent-branch last' : 'indent-branch'"></span>
                        <span th:text="${device.name}">Nom</span>
                    </td>
                    <td>
                        <span class="device-type-badge" th:text="${device.deviceDisplayName}">TYPE</span>
                    </td>
                    <td>
                        <span th:id="'status-text-' + ${device.id}"
                              th:class="'status-indicator ' + ${device.status.name()}"
                              th:text="${device.status.displayValue}"></span>
                    </td>
                    <td class="actions-cell">
                        <button type="button"
                                th:id="'btn-' + ${device.id}"
                                th:onclick="'toggleDeviceAjax(' + ${device.id} + ')'"
                                th:class="${device.status.name() == 'ONLINE' ? 'btn-action btn-off' : 'btn-action btn-on'}"
                                th:disabled="${device.status.name() == 'MAINTENANCE'}"
                                th:text="${device.status.name() == 'ONLINE' ? 'OFF' : 'ON'}">
                        </button>

                        <button type="button"
                                th:id="'btn-repair-' + ${device.id}"
                                th:data-device-id="${device.id}"
                                th:data-category-code="${device.deviceCategoryCode}"
                                onclick="repairDeviceAjax(this.getAttribute('data-device-id'), this.getAttribute('data-category-code'))"
                                class="btn-action btn-repair"
                                th:style="${device.status.name() == 'MAINTENANCE' ? 'display:block' : 'display:none'}">
                            RÉPARER
                        </button>

                        <button class="btn-action btn-delete"
                                th:onclick="'deleteDeviceAjax(' + ${device.id} + ')'">✖</button>
                    </td>
                </tr>
            </th:block>
            </tbody>
        </table>
    </div>

    <div style="margin-top: 20px; text-align: right;">
        <button onclick="document.getElementById('createZoneModal').style.display='flex'" class="cnes-btn">
            Initialiser une nouvelle zone
        </button>
    </div>

</main>

<!-- ══════════════════════════════════════════
     Modals ajout de device (un par zone)
     ══════════════════════════════════════════ -->
<th:block th:each="zone : ${zones}">
    <div th:id="'addDeviceModal-' + ${zone.id}" class="modal-overlay" style="display: none;">
        <div class="modal-content cnes-form">
            <span class="close-modal"
                  th:onclick="'document.getElementById(\'addDeviceModal-' + ${zone.id} + '\').style.display=\'none\''">✕</span>
            <h2 class="modal-title">Ajouter un module</h2>
            <p class="modal-subtitle" th:text="'Zone : ' + ${zone.name}"></p>

            <form th:action="@{/admin/device/create}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="zoneId" th:value="${zone.id}" />

                <div class="form-group">
                    <label class="form-label" th:for="'deviceName-' + ${zone.id}">Nom du module</label>
                    <input class="form-input"
                           type="text"
                           th:id="'deviceName-' + ${zone.id}"
                           name="name"
                           placeholder="Ex: Capteur sas principal"
                           required />
                </div>

                <div class="form-group">
                    <label class="form-label" th:for="'deviceType-' + ${zone.id}">Type de module</label>
                    <select class="form-input form-select"
                            th:id="'deviceType-' + ${zone.id}"
                            name="deviceType"
                            required>
                        <option value="" disabled selected>-- Sélectionner un type --</option>
                        <option th:each="cat : ${deviceCategories}"
                                th:value="${cat.name()}"
                                th:text="${cat.displayName}">
                        </option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button"
                            th:onclick="'document.getElementById(\'addDeviceModal-' + ${zone.id} + '\').style.display=\'none\''"
                            class="btn-action btn-delete">
                        Annuler
                    </button>
                    <button type="submit" class="cnes-btn">
                        Ajouter le module
                    </button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<!-- ══════════════════════════════════════════
     Modal création de zone
     ══════════════════════════════════════════ -->
<div id="createZoneModal" class="modal-overlay" style="display: none;">
    <div class="modal-content cnes-form">
        <span class="close-modal"
              onclick="document.getElementById('createZoneModal').style.display='none'">✕</span>
        <h2 class="modal-title">Initialiser une zone</h2>

        <form th:action="@{/admin/zone/create}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="form-label" for="zoneName">Nom de la zone</label>
                <input class="form-input" type="text" id="zoneName" name="name"
                       placeholder="Ex: Salle des serveurs" required />
            </div>

            <div class="form-group">
                <label class="form-label" for="zoneDescription">Description</label>
                <textarea class="form-input form-textarea" id="zoneDescription" name="description"
                          rows="3" placeholder="Description de la zone..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="zoneImageUrl">Lien de l'image</label>
                <input class="form-input" type="url" id="zoneImageUrl" name="imageUrl"
                       placeholder="https://exemple.com/image.png" />
            </div>

            <div id="imagePreviewContainer" class="image-preview-container" style="display:none;">
                <p class="image-preview-label">Aperçu :</p>
                <img id="imagePreview" src="" alt="Aperçu" class="image-preview-img" />
            </div>

            <div class="form-actions">
                <button type="button"
                        onclick="document.getElementById('createZoneModal').style.display='none'"
                        class="btn-action btn-delete">
                    Annuler
                </button>
                <button type="submit" class="cnes-btn">
                    Créer la zone
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Modal jeu -->
<div id="gameModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">✕</span>
        <iframe id="gameFrame" src=""></iframe>
    </div>
</div>

<script>
    // Prévisualisation image en temps réel
    document.getElementById('zoneImageUrl').addEventListener('input', function () {
        const url = this.value.trim();
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('imagePreviewContainer');
        if (url) {
            preview.src = url;
            preview.onload = () => container.style.display = 'block';
            preview.onerror = () => container.style.display = 'none';
        } else {
            container.style.display = 'none';
        }
    });

    document.querySelectorAll('.modal-overlay').forEach(modal => {
        modal.addEventListener('click', function (e) {
            if (e.target === this) this.style.display = 'none';
        });
    });
</script>

</body>
</html>
