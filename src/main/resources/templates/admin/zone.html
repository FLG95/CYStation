<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Administration - Infrastructures</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin/zone.css}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>
</head>
<body class="bg-dark">
<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <nav class="admin-tabs">
        <a th:href="@{/admin/}" th:classappend="${activeTab == 'users'} ? 'active' : ''" class="tab-item">Gestion Personnel</a>
        <a th:href="@{/admin/zone}" th:classappend="${activeTab == 'zones' or activeTab == null} ? 'active' : ''" class="tab-item">Infrastructure & Modules</a>
    </nav>

    <section class="section-header">
        <h1>Infrastructure & Modules</h1>
        <p>Configuration avancée des infrastructures de la station.</p>
    </section>

    <div class="admin-table-container">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Désignation / Module</th>
                <th>Type / Description</th>
                <th>Statut Système</th>
                <th>Actions de Contrôle</th>
            </tr>
            </thead>
            <tbody>
            <th:block th:each="zone : ${zones}">
                <tr class="zone-row" th:id="'zone-row-' + ${zone.id}">
                    <td>
                        <strong th:text="${zone.name}"
                                contenteditable="true"
                                th:onblur="|updateZoneAjax(${zone.id}, this, 'name')|"
                                class="editable-text">ZONE NAME</strong>
                    </td>
                    <td>
                        <small th:text="${zone.description != null ? zone.description : 'Pas de description'}"
                               contenteditable="true"
                               th:onblur="|updateZoneAjax(${zone.id}, this, 'description')|"
                               class="editable-text"></small>
                    </td>
                    <td>
                        <span class="badge" th:text="${#lists.size(zone.devices)} + ' UNITÉS'"></span>
                    </td>
                    <td class="actions-cell">
                        <button type="button"
                                class="btn-action btn-add"
                                th:onclick="'document.getElementById(\'addDeviceModal-' + ${zone.id} + '\').style.display=\'flex\''">
                            ＋ Module
                        </button>
                        <button class="btn-action btn-delete" th:onclick="'deleteZoneAjax(' + ${zone.id} + ')'">
                            Démanteler
                        </button>
                    </td>
                </tr>

                <tr th:each="device : ${zone.devices}" th:id="'device-row-' + ${device.id}" class="device-row">
                    <td class="device-name-indent">
                        <span class="indent-branch"></span>
                        <span th:text="${device.name}">Nom</span>
                    </td>
                    <td>
                        <span class="device-type-badge" th:text="${device.deviceDisplayName}">TYPE</span>
                    </td>
                    <td>
                        <span th:id="'status-text-' + ${device.id}"
                              th:class="'status-indicator ' + ${device.status.name()}"
                              th:text="${device.status.displayValue}"></span>
                    </td>
                    <td class="actions-cell">
                        <button type="button"
                                th:id="'btn-' + ${device.id}"
                                th:onclick="'toggleDeviceAjax(' + ${device.id} + ')'"
                                th:class="${device.status.name() == 'ONLINE' ? 'btn-action btn-off' : 'btn-action btn-on'}"
                                th:disabled="${device.status.name() == 'MAINTENANCE'}"
                                th:text="${device.status.name() == 'ONLINE' ? 'OFF' : 'ON'}">
                        </button>

                        <button type="button"
                                th:id="'btn-repair-' + ${device.id}"
                                th:data-device-id="${device.id}"
                                th:data-category-code="${device.deviceCategoryCode}"
                                onclick="repairDeviceAjax(this.getAttribute('data-device-id'), this.getAttribute('data-category-code'))"
                                class="btn-action btn-repair"
                                th:style="${device.status.name() == 'MAINTENANCE' ? 'display:block' : 'display:none'}">
                            RÉPARER
                        </button>

                        <button class="btn-action btn-delete" th:onclick="'deleteDeviceAjax(' + ${device.id} + ')'">✖</button>
                    </td>
                </tr>
            </th:block>
            </tbody>
        </table>
    </div>

    <div style="margin-top: 20px; text-align: right;">
        <a href="#createZoneModal" class="cnes-btn">Initialiser une nouvelle zone</a>
    </div>

</main>


<div id="gameModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">x</span>
        <iframe id="gameFrame" src="" frameborder="0" style="width: 100%; height: 600px;"></iframe>
    </div>
</div>

</body>
</html>
