<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>CYStation - Mission</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/admin/zone.css}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>

</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout mt-header">


    <nav class="admin-tabs">
        <a th:href="@{/admin/}"
           th:classappend="${activeTab == 'users'} ? 'active' : ''"
           class="tab-item">
            Gestion Personnel
        </a>
        <a th:href="@{/admin/zone}"
           th:classappend="${activeTab == 'zones'} ? 'active' : ''"
           class="tab-item">
            Infrastructure & Modules
        </a>
    </nav>


    <section class="cnes-section bg-dark-alt">
        <div class="section-header">
            <h2>Répertoire des Infrastructures</h2>
            <a href="#createZoneModal" class="cnes-btn">Initialiser une Zone</a>
        </div>

        <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Désignation / Module</th>
                    <th>Type / Description</th>
                    <th>État</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="zone : ${zones}">
                    <tr class="zone-row" th:id="'zone-row-' + ${zone.id}">
                        <td class="zone-name-cell">
                            <i class="fas fa-layer-group"></i>
                            <strong th:text="${zone.name}">NOM ZONE</strong>
                        </td>
                        <td th:text="${zone.description}">Description de la zone</td>
                        <td>
                            <span class="badge" th:text="${#lists.size(zone.devices)} + ' modules'"></span>
                        </td>
                        <td class="actions-cell">
                            <a th:href="'#addDeviceModal-' + ${zone.id}" class="btn-action">＋ Appareil</a>
                            <button class="btn-action btn-delete" th:onclick="'deleteZoneAjax(' + ${zone.id} + ')'">
                                Supprimer
                            </button>
                        </td>
                    </tr>

                    <tr th:each="device : ${zone.devices}" th:id="'device-row-' + ${device.id}" class="device-row">
                        <td class="device-name-indent">
                            <span class="indent-branch"></span>
                            <span th:text="${device.name}">Nom Appareil</span>
                        </td>
                        <td>
                            <span class="device-type-badge" th:text="${device.deviceDisplayName}">TYPE</span>
                        </td>
                        <td>
                            <span th:id="'status-text-' + ${device.id}"
                                  th:class="'status-indicator ' + ${device.status.name()}"
                                  th:text="${device.status.displayValue}">Statut</span>
                        </td>
                        <td class="actions-cell">
                            <button type="button" class="btn-toggle"
                                    th:onclick="'toggleDeviceAjax(' + ${device.id} + ')'"
                                    th:text="${device.status.name() == 'ONLINE' ? 'OFF' : 'ON'}">
                            </button>
                            <button class="btn-action btn-delete" th:onclick="'deleteDeviceAjax(' + ${device.id} + ')'">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </section>

</main>

<div th:replace="~{public/footer :: footer}"></div>


<div id="gameModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <iframe id="gameFrame" src="" frameborder="0" style="width: 100%; height: 600px;"></iframe>
    </div>
</div>

</body>


</html>
