<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>CYStation - Mission</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/admin/oldZone.css}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>

</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <section class="cnes-hero">
        <div class="cnes-hero-content">
            <span class="tag">Administration Spatiale</span>
            <h1>Gestion des Zones</h1>
            <p>Cartographie des modules de la station.</p>
        </div>
    </section>

    <section class="cnes-section bg-dark-alt">
        <div class="section-header">
            <h2>Réseau des zones actives</h2>
        </div>

        <div class="error-message" th:if="${param.error}">
            <strong>Erreur :</strong> Cette Zone existe déjà.
        </div>

        <div class="cnes-grid infrastructure-grid">


            <th:block th:if="${not #lists.isEmpty(zones)}">
                <a th:href="'#zoneDetailsModal-' + ${zone.id}"
                   class="infra-card" th:each="zone : ${zones}"
                   th:id="'zone-card-' + ${zone.id}" alt="Zone">

                    <img src="https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?auto=format&fit=crop&w=600&q=80"
                         alt="Zone">
                    <div class="infra-overlay">
                        <h3 th:text="${zone.name}"></h3>

                    </div>
                </a>
            </th:block>

            <a href="#createZoneModal" class="infra-card add-card">
                <div class="infra-overlay admin-overlay">
                    <h3>&#10010;<br>Rajouter une zone</h3>
                </div>
            </a>

            <div th:if="${#lists.isEmpty(zones)}" class="empty-state">
                <em>Aucun module enregistré.</em>
            </div>
        </div>
    </section>

    <div th:each="zone : ${zones}" th:id="'zoneDetailsModal-' + ${zone.id}" class="modal">
        <div class="modal-content modal-large">
            <a href="#!" class="close-btn">&#10006;</a>

            <div class="section-header" style="border-bottom: 1px solid var(--color-7)">
                <h2 th:text="${zone.name}"
                    contenteditable="true"
                    class="editable-zone-name"
                    th:onblur="|updateZoneAjax(${zone.id}, this, 'name')|"
                    title="Cliquez pour renommer">
                </h2>

                <p th:text="${zone.description != null ? zone.description : 'Ajouter une description...'}"
                   contenteditable="true"
                   class="editable-zone-desc"
                   th:onblur="|updateZoneAjax(${zone.id}, this, 'description')|"
                   title="Cliquez pour modifier la description">
                </p>

                <button type="button" class="cnes-btn"
                        th:onclick="'deleteZoneAjax(' + ${zone.id} + ')'">
                    Supprimer la Zone
                </button>
            </div>


            <div class="cnes-grid infrastructure-grid">
                <th:block th:if="${not #lists.isEmpty(zone.devices)}">
                    <div class="infra-card" th:each="device : ${zone.devices}" th:id="'device-card-' + ${device.id}">

                        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80"
                             alt="Machine">

                        <div class="infra-overlay">

                            <div class="device-header-info" style="margin-bottom: 10px;">
                                <h3 style="display: inline-block; margin-right: 8px;" th:text="${device.name}"></h3>
                                <span class="device-type-badge" th:text="${device.deviceDisplayName}"></span>
                            </div>
                            <p th:id="'status-text-' + ${device.id}"
                               th:text="${device.status.displayValue}"
                               style="margin-top: 5px; font-size: 0.9em; opacity: 0.8;">
                            </p>

                            <div class="device-controls" style="display: flex; gap: 10px; align-items: center;">
                                <button type="button"
                                        th:id="'btn-' + ${device.id}"
                                        th:onclick="'toggleDeviceAjax(' + ${device.id} + ')'"
                                        th:class="${device.status.name() == 'ONLINE' ? 'btn-toggle off' : 'btn-toggle on'}"
                                        th:disabled="${device.status.name() == 'MAINTENANCE'}"
                                        th:text="${device.status.name() == 'ONLINE' ? 'Éteindre' : 'Allumer'}">
                                </button>

                                <button type="button"
                                        th:id="'btn-repair-' + ${device.id}"
                                        th:data-device-id="${device.id}"
                                        th:data-category-code="${device.deviceCategoryCode}"
                                        onclick="repairDeviceAjax(this.getAttribute('data-device-id'), this.getAttribute('data-category-code'))"
                                        class="btn-repair"
                                        th:style="${device.status.name() == 'MAINTENANCE' ? 'display:block' : 'display:none'}">
                                    Réparer
                                </button>
                            </div>


                            <button type="button" class="cnes-btn btn-full"
                                    th:onclick="'deleteDeviceAjax(' + ${device.id} + ')'">
                                Supprimer l'appareil
                            </button>
                        </div>
                    </div>
                </th:block>

                <a th:href="'#addDeviceModal-' + ${zone.id}" class="infra-card add-card">
                    <div class="infra-overlay admin-overlay">
                        <h3>&#10010;<br>Ajouter un appareil</h3>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div th:each="zone : ${zones}" th:id="'addDeviceModal-' + ${zone.id}" class="modal">
        <div class="modal-content cnes-form">
            <a th:href="'#zoneDetailsModal-' + ${zone.id}" class="close-btn">&#10006;</a>
            <div class="section-header">
                <h2>Ajouter un appareil dans <span style="color: #00e5ff;" th:text="${zone.name}"></span></h2>
            </div>


            <form th:action="@{/mission/device/create}" method="post">

                <input type="hidden" name="zoneId" th:value="${zone.id}">

                <label th:for="'deviceName-' + ${zone.id}">Désignation de l'appareil &#10142;</label>
                <label>
                    <input type="text" th:id="'deviceName-' + ${zone.id}" name="name" required>
                </label>

                <label th:for="'deviceType-' + ${zone.id}">Type de module &#10142;</label>
                <label>
                    <select th:id="'deviceType-' + ${zone.id}" name="deviceType" required>
                        <option value="CO2_SENSOR">Capteur CO2</option>
                        <option value="GENERATOR">Générateur</option>
                        <option value="RADAR">Radar</option>
                        <option value="RADIO">Radio</option>
                    </select>
                </label>

                <button type="submit" class="cnes-btn btn-full">
                    Déployer l'appareil
                </button>
            </form>
        </div>
    </div>

    <div id="createZoneModal" class="modal">
        <div class="modal-content cnes-form">
            <a href="#!" class="close-btn">&#10006;</a>
            <div class="section-header">
                <h2>Initialiser une zone</h2>
            </div>
            <form th:action="@{/mission/zone/create}" method="post">
                <label for="newZoneName">Désignation de la nouvelle zone &#10142;</label>
                <input type="text" id="newZoneName" name="name" required>

                <label for="newZoneDesc">Description du secteur &#10142;</label>
                <textarea id="newZoneDesc" name="description" rows="4"
                          placeholder="Spécifiez la fonction de ce module..."
                ></textarea>

                <button type="submit" class="cnes-btn btn-full">
                    Confirmer le déploiement
                </button>
            </form>
        </div>
    </div>

</main>

<div th:replace="~{public/footer :: footer}"></div>


<div id="gameModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <iframe id="gameFrame" src="" frameborder="0" style="width: 100%; height: 600px;"></iframe>
    </div>
</div>

</body>


</html>
