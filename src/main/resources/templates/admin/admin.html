<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Administration - Utilisateurs</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body class="bg-dark">
<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">
    <section class="section-header">
        <h1>Gestion du Personnel</h1>
        <p>Liste des opérateurs et scientifiques de la station.</p>
    </section>

    <div class="admin-table-container">
        <table class="admin-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Identité & Contact</th>
                <th>Naissance</th>
                <th>Rôle</th>
                <th>Expérience</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}" th:id="'user-row-' + ${user.id}">
                <td th:text="${user.id}">1</td>

                <td>
                    <div class="user-info">
                        <span class="username" th:text="${user.firstName + ' ' + user.lastName}">Prénom Nom</span>
                        <small class="user-email" th:text="${user.email}">email@cnes.fr</small>
                    </div>
                </td>

                <td>
                    <div class="birth-info">
                        <span th:text="${user.birthDate != null ? #temporals.format(user.birthDate, 'dd/MM/yyyy') : 'N/A'}">01/01/2000</span>
                        <small class="gender-label" th:text="${user.gender.getDisplayValue()}">Homme</small>
                    </div>
                </td>

                <td>
                    <span th:id="'role-' + ${user.id}" class="role-badge" th:text="${user.role}">USER</span></td>
                <td>
                <span class="xp-value">
                    <span th:id="'exp-' + ${user.id}" th:text="${user.experience}">100</span> XP
                </span>
                </td>

                <td class="actions-cell">
                    <button class="btn-action btn-exp" th:onclick="|modifyExp(${user.id}, 50)|">+50</button>
                    <button class="btn-action btn-exp" th:onclick="|modifyExp(${user.id}, -50)|">-50</button>
                    <button class="btn-action btn-delete" th:onclick="|deleteUser(${user.id})|">Suprimer l'utilisateur<i
                            class="fas fa-trash"></i></button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    const token = document.querySelector('meta[name="_csrf"]').content;
    const header = document.querySelector('meta[name="_csrf_header"]').content;

    function modifyExp(userId, amount) {
        const formData = new FormData();
        formData.append('id', userId);
        formData.append('amount', amount);

        fetch('/admin/users/add-exp', {
            method: 'POST',
            headers: {[header]: token},
            body: formData
        })
            .then(res => res.json())
            .then(newExp => {
                document.getElementById('exp-' + userId).innerText = newExp;

                let newRole = "ROLE_PASSENGER";
                if (newExp >= 50) {
                    newRole = "ROLE_SCIENTIST";
                } else if (newExp >= 100) {
                    newRole = "ROLE_ADMIN";
                }

                const roleBadge = document.getElementById('role-' + userId);
                if (roleBadge) {
                    roleBadge.innerText = newRole;

                }
            });
    }

    function deleteUser(userId) {
        if (!confirm("Révoquer l'accès de cet utilisateur ?")) return;

        fetch('/admin/users/delete/' + userId, {
            method: 'POST',
            headers: {[header]: token}
        })
            .then(res => {
                if (res.ok) document.getElementById('user-row-' + userId).remove();
            });
    }
</script>
</body>
</html>
