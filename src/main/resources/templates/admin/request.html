<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Administration - Demandes de Suppression</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin/request.css}">
</head>

<body class="bg-dark">

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <nav class="admin-tabs">
        <a th:href="@{/admin/}" th:classappend="${activeTab == 'users'} ? 'active' : ''" class="tab-item">Gestion Personnel</a>
        <a th:href="@{/admin/zone}" th:classappend="${activeTab == 'zones'} ? 'active' : ''" class="tab-item">Infrastructure & Modules</a>
        <a th:href="@{/admin/request}" th:classappend="${activeTab == 'requests' or activeTab == null} ? 'active' : ''" class="tab-item">Demandes de Suppression</a>
    </nav>

    <section class="section-header">
        <h1>Demandes de Suppression</h1>
        <p>Gestion des demandes de suppression de modules en attente de validation.</p>
    </section>

    <div class="admin-table-container">

        <div th:if="${pendingRequests == null or pendingRequests.empty}"
             style="padding: 24px 20px; color: var(--color-6); font-size: 0.9rem; letter-spacing: 0.5px;">
            Aucune demande de suppression en attente.
        </div>

        <table class="admin-table" th:if="${pendingRequests != null and !pendingRequests.empty}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nom du module</th>
                <th>Demandé par</th>
                <th>Statut</th>
                <th style="text-align: center;">Actions de Contrôle</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="device : ${pendingRequests}" th:id="'row-' + ${device.id}">
                <td th:text="${device.id}">1</td>
                <td><strong th:text="${device.name}">Module Alpha</strong></td>
                <td>
                    <span class="badge" th:text="${device.requestedBy}">Nom</span>
                </td>
                <td>
                    <span class="status-indicator MAINTENANCE">EN ATTENTE</span>
                </td>
                <td class="actions-cell">
                    <button type="button"
                            class="btn-action btn-on"
                            th:onclick="|adminProcessDeletion(${device.id}, true)|">
                        Confirmer
                    </button>
                    <button type="button"
                            class="btn-action btn-delete"
                            th:onclick="|adminProcessDeletion(${device.id}, false)|">
                        Rejeter
                    </button>
                </td>
            </tr>
            </tbody>
        </table>

    </div>

</main>

<div th:replace="~{public/footer :: footer}"></div>

<script>
    function adminProcessDeletion(deviceId, isApproved) {

        if (!confirm(isApproved ? "Confirmer la suppression ?" : "Rejeter la demande ?")) return;

        const token = document.querySelector('meta[name="_csrf"]').content;
        const header = document.querySelector('meta[name="_csrf_header"]').content;

        fetch(`/admin/request/process-deletion/${deviceId}?approved=${isApproved}`, {
            method: 'POST',
            headers: {
                [header]: token
            }
        })
            .then(response => {
                if (response.ok) {
                    const row = document.getElementById(`row-${deviceId}`);
                    if (row) row.remove();

                    if (document.querySelectorAll('tbody tr').length === 0) {
                        location.reload();
                    }
                } else {
                    alert('Erreur serveur (Code: ' + response.status + ')');
                }
            })
            .catch(error => alert('Erreur réseau'));
    }
</script>

</body>
</html>
