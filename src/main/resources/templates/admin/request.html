<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Administration - Demandes de Suppression</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin/request.css}">
</head>

<body class="container mt-5">

<div th:replace="~{public/header :: header}"></div>


<main>

    <nav class="admin-tabs">
        <a th:href="@{/admin/}" th:classappend="${activeTab == 'users' or activeTab == null} ? 'active' : ''"
           class="tab-item">Gestion Personnel</a>
        <a th:href="@{/admin/zone}" th:classappend="${activeTab == 'zones'} ? 'active' : ''" class="tab-item">Infrastructure
            & Modules</a>
        <a th:href="@{/admin/request}" th:classappend="${activeTab == 'requests'} ? 'active' : ''" class="tab-item">Demandes
            de Suppression</a>
    </nav>


    <h2 class="mb-4">Gestion des demandes de suppression</h2>

    <div th:if="${pendingRequests.empty}" class="alert alert-info">
        Aucune demande de suppression en attente.
    </div>

    <table class="table table-striped table-hover" th:if="${!pendingRequests.empty}">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nom de l'objet</th>
            <th>Demandé par</th>
            <th>Statut</th>
            <th class="text-center">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="request : ${pendingRequests}">
            <td th:text="${request.id}">1</td>
            <td th:text="${request.name}">Document_Alpha.pdf</td>
            <td>
                <span class="badge bg-info text-dark" th:text="${request.requestedBy}">Nom du Scientifique</span>
            </td>
            <td>
                <span class="badge bg-warning">EN ATTENTE</span>
            </td>
            <td class="text-center">
                <form th:action="@{/process-deletion}" method="post" style="display:inline;">
                    <input type="hidden" name="id" th:value="${request.id}"/>
                    <input type="hidden" name="approved" value="true"/>
                    <button type="submit" class="btn btn-success btn-sm">Confirmer la suppression</button>
                </form>

                <form th:action="@{/process-deletion}" method="post" style="display:inline;">
                    <input type="hidden" name="id" th:value="${request.id}"/>
                    <input type="hidden" name="approved" value="false"/>
                    <button type="submit" class="btn btn-danger btn-sm">Rejeter</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>


</main>


<div th:replace="~{public/footer :: footer}"></div>


</body>


</html>
