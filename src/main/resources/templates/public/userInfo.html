<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Personnel - CYStation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/userInfo.css}">
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout profile-full-page">

    <div class="profile-split-container">

        <div class="profile-info-side">

            <div class="form-wrapper">
                <div class="profile-header">
                    <span class="tag">Dossier Personnel</span>
                    <h2>Profil de l'Équipage</h2>
                    <p>Accès autorisé aux paramètres biométriques et professionnels.</p>
                </div>

                <div th:if="${param.updated}" class="alert alert-success">
                    Votre compte a mis à jour avec succès.
                </div>

                <form th:action="@{/profile/update}" th:object="${user}" method="post" enctype="multipart/form-data">


                    <div class="avatar-selector">
                        <label>Sélectionnez votre avatar :</label>
                        <div class="avatar-grid">

                            <label class="avatar-item">
                                <input type="radio" th:field="*{profilePicture}" value="default-avatar.png" style="display:none;">
                                <img th:src="@{/images/avatars/default-avatar.png}" class="avatar-img-choice">
                            </label>

                            <label class="avatar-item">
                                <input type="radio" th:field="*{profilePicture}" value="avatar1.png" style="display:none;">
                                <img th:src="@{/images/avatars/avatar1.png}" class="avatar-img-choice">
                            </label>

                            <label class="avatar-item">
                                <input type="radio" th:field="*{profilePicture}" value="avatar2.png" style="display:none;">
                                <img th:src="@{/images/avatars/avatar2.png}" class="avatar-img-choice">
                            </label>


                        </div>
                    </div>

                    <input type="hidden" th:field="*{email}"/>

                    <div class="user-details-grid">
                        <div class="detail-item">
                            <label>Prénom</label>
                            <input type="text" th:field="*{firstName}" class="form-control"/>
                        </div>

                        <div class="detail-item">
                            <label>Nom</label>
                            <input type="text" th:field="*{lastName}" class="form-control"/>
                        </div>

                        <div class="detail-item">
                            <label>Email de transmission</label>
                            <input type="email" th:field="*{email}" class="form-control" readonly/>
                            <small class="text-muted">L'email ne peut pas être modifié.</small>
                        </div>

                        <div class="detail-item">
                            <label>Genre</label>
                            <select th:field="*{gender}" class="form-control">
                                <option th:each="g : ${T(io.squid.CyStation.enums.Gender).values()}"
                                        th:value="${g}"
                                        th:text="${g.displayValue}"></option>
                            </select>
                        </div>

                        <div class="detail-item">
                            <label>Date de Naissance</label>
                            <input type="date" th:field="*{birthDate}" class="form-control"/>
                        </div>

                        <div class="detail-item">
                            <label>Rôle actuel</label>
                            <p th:text="${user.role != null ? user.role.displayValue : 'Non assigné'}"
                               class="form-control-plaintext"></p>
                        </div>

                        <div class="detail-item highlight-item">
                            <label>Expérience accumulée</label>
                            <p th:text="${user.experience}" class="form-control-plaintext">0</p>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
                        <a th:href="@{/userInfo}" class="btn btn-secondary">Annuler</a>
                    </div>
                </form>

                <div class="profile-actions">


                </div>


                <form class="delete-button" th:action="@{/user/deleteProfile}" method="post"
                      onsubmit="return confirm('Es-tu vraiment sûr de vouloir nous quitter ? Toutes tes données (EXP, etc.) seront perdues.');">

                    <button type="submit" class="btn btn-outline-danger">
                        Supprimer mon compte définitivement
                    </button>
                </form>


            </div>
        </div>

        <div class="profile-image-side">
        </div>

    </div>

</main>

<div th:replace="~{public/footer :: footer}"></div>

</body>
</html>
