<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - CYStation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout login-full-page">

    <div class="login-split-container">

        <div class="login-form-side">
            <div class="form-wrapper">

                <div th:if="${param.deleted}" class="alert alert-success">
                    Votre compte a été supprimé avec succès. Au plaisir de vous revoir !
                </div>

                <div class="login-header">
                    <h2>Terminal d'Accès</h2>
                    <p>Identifiez-vous pour entrer dans la station.</p>
                </div>

                <form th:action="@{/login}" method="post" class="cnes-form">

                    <div class="form-group full-width">
                        <label for="username">Matricule (Email)</label>
                        <input type="text" id="username" name="username" placeholder="votre.email@cyss.space" required autofocus/>
                    </div>

                    <div class="form-group full-width">
                        <label for="password">Code d'accès</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required/>
                    </div>

                    <button type="submit" class="cnes-btn-submit">Autoriser l'accès</button>
                </form>

                <div class="error-message" th:if="${param.error}">
                    <strong>Accès refusé :</strong> Identifiants non reconnus.
                </div>

                <div class="success-message" th:if="${param.logout}">
                    Session clôturée avec succès.
                </div>

                <div class="register-link">
                    Nouveau membre d'équipage ? <a th:href="@{/register}">S'enrôler ici</a>
                </div>
            </div>
        </div>

        <div class="login-image-side">
        </div>

    </div>

</main>

<div th:replace="~{public/footer :: footer}"></div>

</body>
</html>
