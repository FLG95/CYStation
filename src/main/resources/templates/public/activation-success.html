<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte activé — CYStation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #e5e7eb;
        }
        .icon-circle {
            width: 64px;
            height: 64px;
            background: #ecfdf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #111;
            margin-bottom: 10px;
        }
        p {
            font-size: 0.95rem;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        a {
            display: block;
            background: #111;
            color: #fff;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-circle">✅</div>
    <h1>Compte activé</h1>
    <p th:text="${message}">Votre compte a bien été activé. Vous pouvez maintenant vous connecter.</p>
    <a href="/login">Se connecter</a>
</div>
</body>
</html>
