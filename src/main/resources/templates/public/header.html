<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header" class="cnes-header">


    <div class="header-left">
        <div class="header-logo">
            <a th:href="@{/}">CYStation</a>
        </div>

        <nav class="header-nav">
            <ul>
                <li><a th:href="@{/}">Accueil</a></li>
                <li><a th:href="@{/about}">Information</a></li>
                <li><a sec:authorize="isAuthenticated()" th:href="@{/control}">Control</a></li>
            </ul>
        </nav>
    </div>

    <div class="header-actions">
        <a sec:authorize="isAnonymous()" th:href="@{/login}" class="cnes-btn-nav">Connexion</a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}" class="cnes-btn-nav alt-btn">Inscription</a>

        <a sec:authorize="isAuthenticated()" th:href="@{/userInfo}" class="cnes-btn-nav alt-btn">Mon Profil</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
            <button type="submit" class="cnes-btn-nav logout-btn">Déconnexion</button>
        </form>


        <div sec:authorize="isAuthenticated()" class="header-avatar-wrapper">
            <img th:src="@{/images/avatars/{name}(name=${#authentication.principal instanceof T(org.springframework.security.core.userdetails.UserDetails) ? @userRepository.findUserByEmail(#authentication.name).profilePicture : 'default-avatar.png'})}"
                 alt="Avatar"
                 class="header-avatar-img">
        </div>
    </div>


</header>

</body>
</html>
