<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header" class="cnes-header">
    <div class="header-logo">
        <a th:href="@{/}">
            <img th:src="@{/img/logo.png}" alt="CyStation Logo" style="height: 20px;">
        </a>
    </div>

    <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="header-nav">
        <ul>
            <li><a th:href="@{/}">Accueil</a></li>
            <li><a th:href="@{/about}">Information</a></li>
            <li><a th:href="@{/articles}">Articles</a></li>
            <li><a sec:authorize="isAuthenticated()" th:href="@{/profiles}">Equipage</a></li>
            <li><a sec:authorize="isAuthenticated()" th:href="@{/mission}">Zones</a></li>
        </ul>
        <div class="header-actions">
            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="cnes-btn-nav">Connexion</a>
            <a sec:authorize="isAnonymous()" th:href="@{/register}" class="cnes-btn-nav alt-btn">Inscription</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/userInfo}" class="cnes-btn-nav alt-btn">Mon Profil</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <button type="submit" class="cnes-btn-nav logout-btn">Déconnexion</button>
            </form>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin/}"
               class="cnes-btn-nav alt-btn">
                Administration
            </a>
        </div>
    </nav>

    <script>
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            const nav = document.querySelector('.header-nav');
            const isExpanded = this.getAttribute('aria-expanded') === 'true';
            this.setAttribute('aria-expanded', !isExpanded);
            nav.classList.toggle('active');
        });
    </script>
</header>

</body>
</html>
