<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="'Détail Zone - ' + ${zone.name}">CYStation - Détail Zone</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/zone-detail.css}">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <section class="cnes-hero" id="hero-zone"
             th:style="|background-image: url('${zone.imageUrl != null && !zone.imageUrl.isEmpty() ? zone.imageUrl : 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80'}')|">
        <div class="cnes-hero-content">
            <span class="tag">Administration Secteur</span>
            <div class="header-with-actions">
                <h1 th:text="${zone.name}"
                    contenteditable="true"
                    class="editable-zone-name"
                    th:onblur="|updateZoneAjax(${zone.id}, this, 'name')|">
                </h1>

            </div>

            <p th:text="${zone.description != null ? zone.description : 'Ajouter une description...'}"
               contenteditable="true"
               class="editable-zone-desc"
               th:onblur="|updateZoneAjax(${zone.id}, this, 'description')|">
            </p>

            <div style="margin-top: 20px;">
                <button onclick="openGlobalLogs()" class="cnes-btn" style="background-color: var(--color-9); color: black; font-weight: bold;">
                    <i class="fas fa-satellite-dish"></i> Journal de Bord Global
                </button>
            </div>

        </div>
    </section>

    <section class="cnes-section bg-dark-alt">
        <div class="section-header">
            <h2>Infrastructures de la Zone</h2>
        </div>

        <div class="cnes-grid news-grid">
            <th:block th:each="device : ${zone.devices}">
                <article class="infra-card" th:id="'device-card-' + ${device.id}"
                         style="position: relative; overflow: hidden; border-radius: 8px; min-height: 250px;">

                    <div class="status-led"
                         th:classappend="${device.status.name() == 'ONLINE' ? 'led-on' : 'led-off'}"></div>

                    <div class="btn-delete-request" th:id="'container-delete-' + ${device.id}" sec:authorize="hasRole('SCIENTIST')">
                        <button type="button"
                                th:id="'btn-delete-' + ${device.id}"
                                th:disabled="${device.requestStatus != null && device.requestStatus.name() == 'PENDING'}"
                                th:onclick="|confirmDeletionRequest(${device.id})|"
                                th:style="${device.requestStatus?.name() == 'PENDING'} ? 'opacity:0.5; cursor:not-allowed;' : ''">

                            <span th:id="'text-btn-' + ${device.id}"
                                  th:text="${device.requestStatus?.name() == 'PENDING'} ? 'En attente' : 'Demander la suppression'">
                            </span>
                        </button>
                    </div>

                    <img th:src="${device.deviceImage}" alt="Appareil"
                         style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;">

                    <div class="infra-overlay"
                         style="display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; position: absolute; bottom: 0; left: 0; right: 0; height: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); box-sizing: border-box;">

                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px;">
                            <span style="color: var(--color-9); font-size: 0.9em; font-weight: bold; text-transform: uppercase;"
                                  th:text="${device.deviceDisplayName}"></span>

                            <span style="color: #00e5ff; font-weight: bold; font-size: 1.1em;"
                                  th:id="'telemetry-text-' + ${device.id}" th:text="${device.telemetryDisplay}"></span>

                            <span style="color: #ffffff; font-size: 0.85em;" th:id="'status-text-' + ${device.id}"
                                  th:text="'Statut: ' + ${device.status.displayValue}"></span>
                        </div>

                        <h3 class="article-title" th:text="${device.name}"
                            style="color: white; margin: 0; font-size: 1.4rem;"></h3>

                        <div class="device-controls"
                             style="margin-top: 10px; display: flex; gap: 10px; position: relative; z-index: 10;">
                            <button type="button"
                                    th:id="'btn-' + ${device.id}"
                                    th:onclick="'toggleDeviceAjax(' + ${device.id} + ')'"
                                    th:class="${device.status.name() == 'ONLINE' ? 'btn-toggle off' : 'btn-toggle on'}"
                                    th:disabled="${device.status.name() == 'MAINTENANCE'}"
                                    th:text="${device.status.name() == 'ONLINE' ? 'Éteindre' : 'Allumer'}"
                                    style="position: relative; z-index: 10; cursor: pointer;">
                            </button>

                            <button type="button"
                                    th:id="'btn-repair-' + ${device.id}"
                                    th:data-device-id="${device.id}"
                                    th:data-category-code="${device.deviceCategoryCode}"
                                    onclick="repairDeviceAjax(this.getAttribute('data-device-id'), this.getAttribute('data-category-code'))"
                                    class="btn-repair"
                                    th:style="${device.status.name() == 'MAINTENANCE' ? 'display:block; position: relative; z-index: 10; cursor: pointer;' : 'display:none; position: relative; z-index: 10; cursor: pointer;'}">
                                Réparer
                            </button>
                            <div class="device-controls" style="margin-top: 10px; display: flex; gap: 10px; position: relative; z-index: 10;">
                                <button type="button"
                                        class="btn-action"
                                        style="position: relative; z-index: 10; cursor: pointer; background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold;"
                                        th:onclick="|showDeviceLogs(${device.id})|">
                                    Historique
                                </button>
                            </div>
                        </div>
                    </div>
                </article>
            </th:block>

            <article sec:authorize="hasAnyRole('ADMIN', 'SCIENTIST')" class="cnes-card add-card"
                     style="min-height: 250px;">
                <a th:href="'#addDeviceModal-' + ${zone.id}">
                    <h3>+<br>Ajouter un appareil</h3>
                </a>
            </article>
        </div>
    </section>

</main>

<div th:id="'addDeviceModal-' + ${zone.id}" class="modal">
    <div class="modal-content cnes-form">
        <a href="#!" class="close-btn">x</a>
        <h2>Déployer un module dans <span th:text="${zone.name}"></span></h2>

        <form th:action="@{/mission/device/create}" method="post">
            <input type="hidden" name="zoneId" th:value="${zone.id}">

            <label>Nom du module</label>
            <label>
                <input type="text" th:id="'deviceName-' + ${zone.id}" name="name" required>
            </label>
            <label th:for="'deviceType-' + ${zone.id}">Type de module &#10142;</label>
            <select th:id="'deviceType-' + ${zone.id}" name="deviceType" required>
                <option th:each="category : ${deviceCategories}"
                        th:value="${category.name()}"
                        th:text="${category.displayName}">
                </option>
            </select>

            <button type="submit" class="cnes-btn btn-full">Confirmer</button>
        </form>
    </div>
</div>

<div id="gameModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">x</span>
        <iframe id="gameFrame" src="" frameborder="0" style="width: 100%; height: 600px;"></iframe>
    </div>
</div>
<div id="logsModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center;">
    <div class="modal-content" style="background: #1a1a1a; color: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 1000px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--color-9); box-shadow: 0 0 20px rgba(0,229,255,0.2);">

        <span onclick="closeLogsModal()" style="color: white; float: right; font-size: 28px; cursor: pointer;">&times;</span>

        <h2 id="modalTitle" style="color: var(--color-9); margin-top: 0;">Historique du Module</h2>

        <div class="report-nav" style="margin: 20px 0; display: flex; gap: 10px; border-bottom: 1px solid #333; padding-bottom: 15px;">
            <button id="btn-live" onclick="refreshCurrentDeviceLogs()" class="btn-action" style="background: #333;">📡 Live (Ce module)</button>
            <button onclick="showReport('hour')" class="btn-action" style="background: #333;">🕒 Dernière Heure</button>
            <button onclick="showReport('recent')" class="btn-action" style="background: #333;">👤 50 Dernières Actions</button>
        </div>

        <div id="logsContainer">
        </div>
    </div>
</div>
<div th:replace="~{public/footer :: footer}"></div>
</body>
</html>


<script>
    function confirmDeletionRequest(deviceId) {
        const text = "Confirmer la demande ?\nL'administrateur devra valider la suppression de ce module.";
        if (confirm(text)) {
            sendDeletionRequest(deviceId);
        }
    }

    function sendDeletionRequest(deviceId) {
        const csrfTokenElement = document.querySelector('meta[name="_csrf"]');
        const csrfHeaderElement = document.querySelector('meta[name="_csrf_header"]');

        if (!csrfTokenElement || !csrfHeaderElement) {
            console.error("Erreur : Jetons CSRF introuvables dans le <head>");
            alert("Erreur de sécurité : session expirée ou invalide.");
            return;
        }

        const token = csrfTokenElement.content;
        const header = csrfHeaderElement.content;

        fetch(`/mission/device/request-deletion/${deviceId}`, {
            method: 'POST',
            headers: {
                [header]: token,
                'Content-Type': 'application/json'
            }
        })
            .then(response => {
                if (response.ok) {
                    alert("Transmis ! La demande est en attente de validation.");
                    location.reload();
                } else {
                    console.error("Erreur serveur:", response.status);
                    alert("Erreur serveur : " + response.status);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Erreur réseau.");
            });
    }

    let currentOpenDeviceId = null;

    function showDeviceLogs(deviceId) {
        currentOpenDeviceId = deviceId;
        document.getElementById('btn-live').innerText = '📡 Live (Ce module)';
        document.getElementById('logsModal').style.display = 'flex';
        refreshCurrentDeviceLogs();
    }

    function openGlobalLogs() {
        currentOpenDeviceId = null;
        document.getElementById('btn-live').innerText = '📡 Live (Station Entière)';
        document.getElementById('logsModal').style.display = 'flex';
        refreshCurrentDeviceLogs();
    }

    function refreshCurrentDeviceLogs() {
        const url = currentOpenDeviceId
            ? `/mission/device/${currentOpenDeviceId}/logs`
            : `/admin/reports/last-hour`;

        const title = currentOpenDeviceId
            ? "Historique — Module #" + currentOpenDeviceId
            : "Historique — Station Entière";

        fetch(url)
            .then(res => res.json())
            .then(data => updateLogsTable(data, title));
    }

    function showReport(type) {
        const baseUrl = type === 'hour' ? '/admin/reports/last-hour' : '/admin/reports/recent-actions';
        const url = currentOpenDeviceId ? `${baseUrl}?deviceId=${currentOpenDeviceId}` : baseUrl;

        const scope = currentOpenDeviceId ? "ce module" : "toute la station";
        const title = type === 'hour' ? `Dernière Heure (${scope})` : `50 Dernières Actions (${scope})`;

        fetch(url)
            .then(res => res.json())
            .then(data => updateLogsTable(data, title));
    }

    function updateLogsTable(logs, title) {
        const container = document.getElementById('logsContainer');
        document.getElementById('modalTitle').innerText = title;

        if (!logs || logs.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: #888; padding: 40px;">Aucune donnée enregistrée.</p>';
            return;
        }

        let html = `
        <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <thead>
                <tr style="border-bottom: 2px solid var(--color-9); text-align: left;">
                    <th style="padding: 12px;">Date</th>
                    <th style="padding: 12px;">Événement</th>
                    <th style="padding: 12px;">Opérateur</th>
                    <th style="padding: 12px;">Métrique</th>
                    <th style="padding: 12px;">Ancien</th>
                    <th style="padding: 12px;">Nouveau</th>
                </tr>
            </thead>
            <tbody>`;

        logs.forEach(log => {
            const date = new Date(log.timestamp).toLocaleString('fr-FR');
            const op = log.operatorName || '<span style="opacity: 0.5;">SYSTEM</span>';
            const isTelemetry = log.eventType === 'TELEMETRY';

            html += `
            <tr style="border-bottom: 1px solid #333;">
                <td style="padding: 10px; font-size: 0.85rem; color: #aaa;">${date}</td>
                <td style="padding: 10px;"><span style="font-size: 0.75rem; padding: 2px 6px; background: ${isTelemetry ? '#1a3a3a' : '#3a1a1a'}; border-radius: 4px;">${log.eventType}</span></td>
                <td style="padding: 10px; font-weight: bold; color: var(--color-9);">${op}</td>
                <td style="padding: 10px;">${log.metricName || '—'}</td>
                <td style="padding: 10px; color: #ff6b6b;">${log.oldNumericValue ?? log.oldStringValue ?? '—'}</td>
                <td style="padding: 10px; color: #51cf66; font-weight: bold;">${log.newNumericValue ?? log.newStringValue ?? '—'}</td>
            </tr>`;
        });
        container.innerHTML = html + '</tbody></table>';
    }

    function closeLogsModal() {
        document.getElementById('logsModal').style.display = 'none';
        currentOpenDeviceId = null;
    }

</script>

</body>
</html>
