<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="'Détail Zone - ' + ${zone.name}">CYStation - Détail Zone</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/zone-detail.css}">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <section class="cnes-hero" id="hero-zone"
             th:style="|background-image: url('${zone.imageUrl != null && !zone.imageUrl.isEmpty() ? zone.imageUrl : 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80'}')|">
        <div class="cnes-hero-content">
            <span class="tag">Administration Secteur</span>
            <div class="header-with-actions">
                <h1 th:text="${zone.name}"
                    contenteditable="true"
                    class="editable-zone-name"
                    th:onblur="|updateZoneAjax(${zone.id}, this, 'name')|">
                </h1>
            </div>

            <p th:text="${zone.description != null ? zone.description : 'Ajouter une description...'}"
               contenteditable="true"
               class="editable-zone-desc"
               th:onblur="|updateZoneAjax(${zone.id}, this, 'description')|">
            </p>

            <div style="margin-top: 20px;">
                <button onclick="openGlobalLogs()" class="cnes-btn" style="background-color: var(--color-9); color: black; font-weight: bold;">
                    &#128225; Journal de Bord Global
                </button>
            </div>
        </div>
    </section>

    <section class="cnes-section bg-dark-alt">
        <div class="section-header">
            <h2>Infrastructures de la Zone</h2>
        </div>

        <div class="cnes-grid news-grid">
            <th:block th:each="device : ${zone.devices}">
                <article class="infra-card" th:id="'device-card-' + ${device.id}"
                         style="position: relative; overflow: hidden; border-radius: 8px; min-height: 250px;">

                    <!-- LED : verte si ONLINE, orange si MAINTENANCE, rouge sinon -->
                    <div class="status-led"
                         th:classappend="${device.status.name() == 'ONLINE' ? 'led-on' : (device.status.name() == 'MAINTENANCE' ? 'led-maintenance' : 'led-off')}"
                         th:id="'led-' + ${device.id}">
                    </div>

                    <div class="btn-delete-request" th:id="'container-delete-' + ${device.id}" sec:authorize="hasRole('SCIENTIST')">
                        <button type="button"
                                th:id="'btn-delete-' + ${device.id}"
                                th:disabled="${device.requestStatus != null && device.requestStatus.name() == 'PENDING'}"
                                th:onclick="|confirmDeletionRequest(${device.id})|"
                                th:style="${device.requestStatus?.name() == 'PENDING'} ? 'opacity:0.5; cursor:not-allowed;' : ''">
                            <span th:id="'text-btn-' + ${device.id}"
                                  th:text="${device.requestStatus?.name() == 'PENDING'} ? 'En attente' : 'Demander la suppression'">
                            </span>
                        </button>
                    </div>

                    <img th:src="${device.deviceImage}" alt="Appareil"
                         style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;">

                    <div class="infra-overlay"
                         style="display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; position: absolute; bottom: 0; left: 0; right: 0; height: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); box-sizing: border-box;">

                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px;">
                            <span style="color: var(--color-9); font-size: 0.9em; font-weight: bold; text-transform: uppercase;"
                                  th:text="${device.deviceDisplayName}"></span>

                            <span style="color: #00e5ff; font-weight: bold; font-size: 1.1em;"
                                  th:id="'telemetry-text-' + ${device.id}" th:text="${device.telemetryDisplay}"></span>

                            <span style="color: #ffffff; font-size: 0.85em;" th:id="'status-text-' + ${device.id}"
                                  th:text="'Statut: ' + ${device.status.displayValue}"></span>
                        </div>

                        <h3 class="article-title" th:text="${device.name}"
                            style="color: white; margin: 0; font-size: 1.4rem;"></h3>

                        <div class="device-controls">
                            <button type="button"
                                    th:id="'btn-' + ${device.id}"
                                    th:onclick="'toggleDeviceAjax(' + ${device.id} + ')'"
                                    th:class="${device.status.name() == 'ONLINE' ? 'btn-toggle off' : 'btn-toggle on'}"
                                    th:disabled="${device.status.name() == 'MAINTENANCE'}"
                                    th:text="${device.status.name() == 'ONLINE' ? 'Éteindre' : 'Allumer'}">
                            </button>

                            <button type="button"
                                    th:id="'btn-repair-' + ${device.id}"
                                    th:data-device-id="${device.id}"
                                    th:data-category-code="${device.deviceCategoryCode}"
                                    onclick="repairDeviceAjax(this.getAttribute('data-device-id'), this.getAttribute('data-category-code'))"
                                    class="btn-repair"
                                    th:style="${device.status.name() == 'MAINTENANCE' ? 'display:block;' : 'display:none;'}">
                                Réparer
                            </button>

                            <button type="button"
                                    class="btn-history"
                                    th:onclick="|showDeviceLogs(${device.id})|">
                                Historique
                            </button>
                        </div>
                    </div>
                </article>
            </th:block>

            <article sec:authorize="hasAnyRole('ADMIN', 'SCIENTIST')" class="cnes-card add-card"
                     style="min-height: 250px;">
                <a th:href="'#addDeviceModal-' + ${zone.id}">
                    <h3>+<br>Ajouter un appareil</h3>
                </a>
            </article>
        </div>
    </section>

</main>

<!-- Modal ajout device -->
<div th:id="'addDeviceModal-' + ${zone.id}" class="modal">
    <div class="modal-content cnes-form">
        <a href="#!" class="close-btn">&times;</a>
        <h2>Déployer un module dans <span th:text="${zone.name}"></span></h2>

        <form th:action="@{/mission/device/create}" method="post">
            <input type="hidden" name="zoneId" th:value="${zone.id}">

            <label>Nom du module</label>
            <input type="text" th:id="'deviceName-' + ${zone.id}" name="name" required>

            <label th:for="'deviceType-' + ${zone.id}">Type de module &#10142;</label>
            <select th:id="'deviceType-' + ${zone.id}" name="deviceType" required>
                <option th:each="category : ${deviceCategories}"
                        th:value="${category.name()}"
                        th:text="${category.displayName}">
                </option>
            </select>

            <button type="submit" class="cnes-btn btn-full">Confirmer</button>
        </form>
    </div>
</div>

<!-- Modal jeu -->
<div id="gameModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <iframe id="gameFrame" src="" frameborder="0" style="width: 100%; height: 600px;"></iframe>
    </div>
</div>

<!-- =====================================================
     LOGS MODAL — structure avec classes CSS propres
     ===================================================== -->
<div id="logsModal" class="modal-overlay">
    <div class="logs-modal-panel">

        <div class="logs-modal-header">
            <div class="logs-modal-title">
                <h2 id="modalTitle">Historique du Module</h2>
                <span class="logs-modal-subtitle" id="modalSubtitle">Données de télémétrie et actions opérateur</span>
            </div>
            <button class="logs-close-btn" onclick="closeLogsModal()" aria-label="Fermer">&times;</button>
        </div>

        <div class="logs-nav">
            <button id="btn-live" class="logs-nav-btn active" onclick="refreshCurrentDeviceLogs()">
                &#128225; Live
            </button>
            <button class="logs-nav-btn" onclick="showReport('hour'); setActiveNav(this)">
                &#128336; Dernière Heure
            </button>
            <button class="logs-nav-btn" onclick="showReport('recent'); setActiveNav(this)">
                &#128100; 50 Dernières Actions
            </button>
        </div>

        <div class="logs-body">
            <div id="logsContainer"></div>
        </div>

    </div>
</div>

<div th:replace="~{public/footer :: footer}"></div>

<script>
    /* ---- CSRF ---- */
    const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

    /* ---- Deletion ---- */
    function confirmDeletionRequest(deviceId) {
        if (confirm("Confirmer la demande ?\nL'administrateur devra valider la suppression de ce module.")) {
            sendDeletionRequest(deviceId);
        }
    }

    function sendDeletionRequest(deviceId) {
        if (!csrfToken || !csrfHeader) { alert("Erreur de sécurité : session expirée."); return; }
        fetch(`/mission/device/request-deletion/${deviceId}`, {
            method: 'POST',
            headers: { [csrfHeader]: csrfToken, 'Content-Type': 'application/json' }
        })
            .then(r => r.ok ? (alert("Demande transmise et en attente de validation."), location.reload()) : alert("Erreur serveur : " + r.status))
            .catch(() => alert("Erreur réseau."));
    }

    /* ---- Logs Modal ---- */
    let currentOpenDeviceId = null;

    function setActiveNav(btn) {
        document.querySelectorAll('.logs-nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showDeviceLogs(deviceId) {
        currentOpenDeviceId = deviceId;
        document.getElementById('btn-live').innerText = '📡 Live — Module #' + deviceId;
        document.getElementById('logsModal').style.display = 'flex';
        document.querySelectorAll('.logs-nav-btn').forEach((b,i) => b.classList.toggle('active', i === 0));
        refreshCurrentDeviceLogs();
    }

    function openGlobalLogs() {
        currentOpenDeviceId = null;
        document.getElementById('btn-live').innerText = '📡 Live — Station Entière';
        document.getElementById('logsModal').style.display = 'flex';
        document.querySelectorAll('.logs-nav-btn').forEach((b,i) => b.classList.toggle('active', i === 0));
        refreshCurrentDeviceLogs();
    }

    function refreshCurrentDeviceLogs() {
        const url   = currentOpenDeviceId ? `/mission/device/${currentOpenDeviceId}/logs` : `/admin/reports/last-hour`;
        const title = currentOpenDeviceId ? `Module #${currentOpenDeviceId}` : `Station Entière`;
        const sub   = currentOpenDeviceId ? `Télémétrie & actions — device ${currentOpenDeviceId}` : `Vue globale de la station`;
        fetch(url).then(r => r.json()).then(data => updateLogsTable(data, title, sub));
    }

    function showReport(type) {
        const baseUrl = type === 'hour' ? '/admin/reports/last-hour' : '/admin/reports/recent-actions';
        const url     = currentOpenDeviceId ? `${baseUrl}?deviceId=${currentOpenDeviceId}` : baseUrl;
        const scope   = currentOpenDeviceId ? `Module #${currentOpenDeviceId}` : 'Station Entière';
        const title   = type === 'hour' ? `Dernière Heure — ${scope}` : `50 Dernières Actions — ${scope}`;
        const sub     = type === 'hour' ? 'Événements des 60 dernières minutes' : 'Actions opérateur les plus récentes';
        fetch(url).then(r => r.json()).then(data => updateLogsTable(data, title, sub));
    }

    function updateLogsTable(logs, title, subtitle) {
        document.getElementById('modalTitle').innerText    = title;
        document.getElementById('modalSubtitle').innerText = subtitle || '';
        const container = document.getElementById('logsContainer');

        if (!logs || logs.length === 0) {
            container.innerHTML = `
                <div class="logs-empty">
                    <div class="logs-empty-icon">⚠</div>
                    <p>Aucune donnée enregistrée pour cette sélection.</p>
                </div>`;
            return;
        }

        const rows = logs.map(log => {
            const date        = new Date(log.timestamp).toLocaleString('fr-FR');
            const isTelemetry = log.eventType === 'TELEMETRY';
            const isAction    = ['TOGGLE','REPAIR','UPDATE'].includes(log.eventType);
            const badgeClass  = isTelemetry ? 'telemetry' : (isAction ? 'action' : 'other');
            const opCell      = log.operatorName
                ? `<span class="log-op">${log.operatorName}</span>`
                : `<span class="log-sys">SYSTEM</span>`;

            return `
            <tr>
                <td class="log-date">${date}</td>
                <td><span class="log-badge ${badgeClass}">${log.eventType}</span></td>
                <td>${opCell}</td>
                <td class="log-metric">${log.metricName || '—'}</td>
                <td class="log-old">${log.oldNumericValue ?? log.oldStringValue ?? '—'}</td>
                <td class="log-new">${log.newNumericValue ?? log.newStringValue ?? '—'}</td>
            </tr>`;
        }).join('');

        container.innerHTML = `
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Événement</th>
                        <th>Opérateur</th>
                        <th>Métrique</th>
                        <th>Ancien</th>
                        <th>Nouveau</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    function closeLogsModal() {
        document.getElementById('logsModal').style.display = 'none';
        currentOpenDeviceId = null;
    }

    /* Fermer avec Échap */
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeLogsModal();
    });

    /* Fermer en cliquant sur le fond */
    document.getElementById('logsModal').addEventListener('click', function(e) {
        if (e.target === this) closeLogsModal();
    });
</script>

</body>
</html>
