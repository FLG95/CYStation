<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="'Détail Zone - ' + ${zone.name}">CYStation - Détail Zone</title>
    <link rel="icon" type="image/png" th:href="@{/img/meatlogo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/zone-detail.css}">

    <style>
        .cnes-filter-control {
            background: transparent;
            border: 1px solid var(--color-9);
            color: var(--color-9);
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .cnes-filter-control::placeholder {
            color: var(--color-9);
            opacity: 0.7;
        }

        .cnes-filter-control:hover,
        .cnes-filter-control.active-filter {
            background: var(--color-9);
            color: black;
        }

        .cnes-filter-control:focus {
            box-shadow: 0 0 10px var(--color-9);
        }

        select.cnes-filter-control option {
            background: #111;
            color: var(--color-9);
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <section class="cnes-hero" id="hero-zone"
             th:style="|background-image: url('${zone.imageUrl != null && !zone.imageUrl.isEmpty() ? zone.imageUrl : 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80'}')|">
        <div class="cnes-hero-content">
            <div class="header-with-actions">
                <h1 th:text="${zone.name}"
                    contenteditable="true"
                    class="editable-zone-name"
                    th:onblur="|updateZoneAjax(${zone.id}, this, 'name')|">
                </h1>
            </div>

            <p th:text="${zone.description != null ? zone.description : 'Ajouter une description...'}"
               contenteditable="true"
               class="editable-zone-desc"
               th:onblur="|updateZoneAjax(${zone.id}, this, 'description')|">
            </p>

        </div>
    </section>

    <section class="cnes-section bg-dark-alt">
        <div class="section-header" style="display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px;">
            <h2>Infrastructures de la Zone</h2>

            <div class="device-filters" style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                <input type="text" id="deviceSearchInput" class="cnes-filter-control" placeholder="Localiser un module...">

                <button id="filterSensorBtn"
                        onclick="toggleSensorFilter()"
                        class="cnes-filter-control"
                        style="cursor: pointer;">
                    Capteurs uniquement
                </button>

                <select id="statusFilterSelect"
                        onchange="applyDeviceFilters()"
                        class="cnes-filter-control"
                        style="cursor: pointer;">
                    <option value="">Tous les statuts</option>
                    <option value="ONLINE">En marche</option>
                    <option value="OFFLINE">À l'arrêt</option>
                    <option value="MAINTENANCE">Maintenance</option>
                </select>
            </div>
        </div>

        <div id="noDeviceResult" style="display:none; text-align:center; padding: 12px 20px; color: var(--color-9); background: rgba(0,0,0,0.4); border: 1px dashed var(--color-9); border-radius: 4px; margin-bottom: 20px;">
            <span style="font-weight: bold; margin-right: 8px;">[!]</span> Aucun module ne correspond à votre recherche.
        </div>

        <div class="energy-monitor" th:id="'energy-zone-' + ${zone.id}">
            <div class="energy-stats">
                <span>Production:
                    <strong th:id="'prod-' + ${zone.id}"
                            th:text="${#numbers.formatDecimal(zone.totalProduction, 1, 0)}">0</strong> GW
                </span>
                <span>Consommation:
                    <strong th:id="'cons-' + ${zone.id}"
                            th:text="${#numbers.formatDecimal(zone.totalConsumption, 1, 0)}">0</strong> GW
                </span>
            </div>
            <div class="energy-bar-container">
                <div th:id="'bar-' + ${zone.id}"
                     class="energy-bar-fill"
                     th:style="'width: ' + ${zone.totalProduction > 0 ? (zone.totalConsumption / zone.totalProduction) * 100 : 0} + '%'">
                </div>
            </div>
        </div>

        <div class="cnes-grid news-grid">
            <th:block th:each="device : ${zone.devices}">
                <article class="infra-card device-item" th:id="'device-card-' + ${device.id}"
                         th:data-name="${device.name}"
                         th:data-status="${device.status.name()}"
                         th:data-is-sensor="${#strings.contains(device.deviceCategoryCode, 'SENSOR')}"
                         style="position: relative; overflow: hidden; border-radius: 8px; min-height: 250px;">

                    <div class="status-led"
                         th:classappend="${device.status.name() == 'ONLINE' ? 'led-on' : (device.status.name() == 'MAINTENANCE' ? 'led-maintenance' : 'led-off')}"
                         th:id="'led-' + ${device.id}">
                    </div>

                    <div class="btn-delete-request" th:id="'container-delete-' + ${device.id}"
                         sec:authorize="hasRole('SCIENTIST')">
                        <button type="button"
                                th:id="'btn-delete-' + ${device.id}"
                                th:disabled="${device.requestStatus != null && device.requestStatus.name() == 'PENDING'}"
                                th:onclick="|confirmDeletionRequest(${device.id})|"
                                th:style="${device.requestStatus?.name() == 'PENDING'} ? 'opacity:0.5; cursor:not-allowed;' : ''">
                            <span th:id="'text-btn-' + ${device.id}"
                                  th:text="${device.requestStatus?.name() == 'PENDING'} ? 'En attente' : 'Demander la suppression'">
                            </span>
                        </button>
                    </div>

                    <div class="btn-delete-request" th:id="'container-maintenance-' + ${device.id}"
                         sec:authorize="hasRole('ADMIN')">
                        <button type="button"
                                th:id="'btn-maintenance-' + ${device.id}"
                                th:disabled="${device.status?.name() == 'MAINTENANCE'}"
                                th:onclick="|maintenanceDeviceAjax(${device.id})|"
                                th:style="${device.status?.name() == 'MAINTENANCE'} ? 'opacity:0.5; cursor:not-allowed;' : ''">
                            <span th:id="'text-maintenance-' + ${device.id}"
                                  th:text="${device.status?.name() == 'MAINTENANCE'} ? 'Déjà en maintenance' : 'Mettre en maintenance'">
                            </span>
                        </button>
                    </div>

                    <img th:src="${device.deviceImage}" alt="Appareil"
                         style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;">

                    <div class="infra-overlay"
                         style="display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; position: absolute; bottom: 0; left: 0; right: 0; height: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); box-sizing: border-box;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px;">
                            <span style="color: var(--color-9); font-size: 0.9em; font-weight: bold; text-transform: uppercase;"
                                  th:text="${device.deviceDisplayName}"></span>

                            <span style="color: #00e5ff; font-weight: bold; font-size: 1.1em;"
                                  th:id="'telemetry-text-' + ${device.id}" th:text="${device.telemetryDisplay}"></span>

                            <span th:id="'status-text-' + ${device.id}"
                                  th:class="'status-indicator ' + ${device.status.name()}"
                                  th:text="${device.status.displayValue}">
                            </span>
                        </div>
                        <h3 class="article-title" th:text="${device.name}"
                            style="color: white; margin: 0; font-size: 1.4rem;"></h3>

                        <div class="device-controls">

                            <button type="button"
                                    th:id="'btn-' + ${device.id}"
                                    th:data-id="${device.id}"
                                    onclick="toggleDeviceAjax(this.getAttribute('data-id'))"
                                    th:if="${!#authorization.expression('hasRole(''PASSENGER'')') or device.deviceTypeName == 'CoffeeMachine'}"
                                    th:class="${device.status?.name() == 'ONLINE' ? 'btn-toggle off' : 'btn-toggle on'}"
                                    th:disabled="${device.status?.name() == 'MAINTENANCE'}"
                                    th:text="${device.status?.name() == 'ONLINE' ? 'Éteindre' : 'Allumer'}">
                            </button>

                            <th:block th:if="${device.status?.name() == 'MAINTENANCE'}">
                                <button type="button"
                                        th:id="'btn-repair-' + ${device.id}"
                                        th:data-id="${device.id}"
                                        th:data-cat="${device.deviceCategoryCode}"
                                        onclick="repairDeviceAjax(this.getAttribute('data-id'), this.getAttribute('data-cat'))"
                                        class="btn-repair"

                                        th:if="${!#authorization.expression('hasAuthority(''ROLE_PASSENGER'')') or device.deviceTypeName == 'CoffeeMachine'}">
                                    Réparer
                                </button>
                            </th:block>

                            <button type="button"
                                    class="btn-history"
                                    th:data-id="${device.id}"
                                    onclick="showDeviceLogs(this.getAttribute('data-id'))"
                                    th:if="${!#authorization.expression('hasAuthority(''ROLE_PASSENGER'')') or device.deviceTypeName == 'CoffeeMachine'}">
                                Historique
                            </button>

                        </div>
                    </div>
                </article>
            </th:block>

            <article sec:authorize="hasAnyRole('ADMIN', 'SCIENTIST')" class="cnes-card add-card"
                     style="min-height: 250px;">
                <a th:href="'#addDeviceModal-' + ${zone.id}">
                    <h3>+<br>Ajouter un appareil</h3>
                </a>
            </article>
        </div>
    </section>

</main>

<div th:id="'addDeviceModal-' + ${zone.id}" class="modal">
    <div class="modal-content cnes-form">
        <a href="#!" class="close-btn">&times;</a>
        <h2>Déployer un module dans <span th:text="${zone.name}"></span></h2>

        <form th:action="@{/mission/device/create}" method="post">
            <input type="hidden" name="zoneId" th:value="${zone.id}">

            <label>Nom du module</label>
            <input type="text" th:id="'deviceName-' + ${zone.id}" name="name" required>

            <label th:for="'deviceType-' + ${zone.id}">Type de module &#10142;</label>
            <select th:id="'deviceType-' + ${zone.id}" name="deviceType" required>
                <option th:each="category : ${deviceCategories}"
                        th:value="${category.name()}"
                        th:text="${category.displayName}">
                </option>
            </select>

            <button type="submit" class="cnes-btn btn-full">Confirmer</button>
        </form>
    </div>
</div>


<div id="gameModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <iframe id="gameFrame" src="" frameborder="0" style="width: 100%; height: 600px;"></iframe>
    </div>
</div>


<div id="logsModal" class="modal-overlay">
    <div class="logs-modal-panel">

        <div class="logs-modal-header">
            <div class="logs-modal-title">
                <h2 id="modalTitle">Historique du Module</h2>
                <span class="logs-modal-subtitle" id="modalSubtitle">Données de télémétrie et actions opérateur</span>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button class="logs-download-btn" onclick="generateLogReport()" title="Générer Rapport .txt">&#10515;
                </button>
                <button class="logs-close-btn" onclick="closeLogsModal()" aria-label="Fermer">&times;</button>
            </div>
        </div>

        <div class="logs-nav">
            <button id="btn-live" class="logs-nav-btn active" onclick="refreshCurrentDeviceLogs(); setActiveNav(this)">
                Live
            </button>
            <button class="logs-nav-btn" onclick="showReport('hour'); setActiveNav(this)">
                Dernière Heure
            </button>
            <button class="logs-nav-btn" onclick="showReport('recent'); setActiveNav(this)">
                50 Dernières Actions
            </button>
        </div>

        <div class="logs-body">
            <div id="logsContainer"></div>
        </div>

    </div>
</div>

<div th:replace="~{public/footer :: footer}"></div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

    function confirmDeletionRequest(deviceId) {
        if (confirm("Confirmer la demande ?\nL'administrateur devra valider la suppression de ce module.")) {
            sendDeletionRequest(deviceId);
        }
    }

    function sendDeletionRequest(deviceId) {
        if (!csrfToken || !csrfHeader) {
            alert("Erreur de sécurité : session expirée.");
            return;
        }
        fetch(`/mission/device/request-deletion/${deviceId}`, {
            method: 'POST',
            headers: {[csrfHeader]: csrfToken, 'Content-Type': 'application/json'}
        })
            .then(r => r.ok ? (alert("Demande transmise et en attente de validation."), location.reload()) : alert("Erreur serveur : " + r.status))
            .catch(() => alert("Erreur réseau."));
    }

    let currentOpenDeviceId = null;
    let lastLogsData = [];

    function setActiveNav(btn) {
        document.querySelectorAll('.logs-nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showDeviceLogs(deviceId) {
        currentOpenDeviceId = deviceId;
        document.getElementById('btn-live').innerText = '► Live — Module #' + deviceId;
        document.getElementById('logsModal').style.display = 'flex';
        document.querySelectorAll('.logs-nav-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
        refreshCurrentDeviceLogs();
    }

    function openGlobalLogs() {
        currentOpenDeviceId = null;
        document.getElementById('btn-live').innerText = '► Live — Station Entière';
        document.getElementById('logsModal').style.display = 'flex';
        document.querySelectorAll('.logs-nav-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
        refreshCurrentDeviceLogs();
    }

    function refreshCurrentDeviceLogs() {
        const url = currentOpenDeviceId ? `/mission/device/${currentOpenDeviceId}/logs` : `/admin/reports/last-hour`;
        const title = currentOpenDeviceId ? `Module #${currentOpenDeviceId}` : `Station Entière`;
        const sub = currentOpenDeviceId ? `Télémétrie & actions — device ${currentOpenDeviceId}` : `Vue globale de la station`;
        fetch(url).then(r => r.json()).then(data => updateLogsTable(data, title, sub));
    }

    function showReport(type) {
        const baseUrl = type === 'hour' ? '/admin/reports/last-hour' : '/admin/reports/recent-actions';
        const url = currentOpenDeviceId ? `${baseUrl}?deviceId=${currentOpenDeviceId}` : baseUrl;
        const scope = currentOpenDeviceId ? `Module #${currentOpenDeviceId}` : 'Station Entière';
        const title = type === 'hour' ? `Dernière Heure — ${scope}` : `50 Dernières Actions — ${scope}`;
        const sub = type === 'hour' ? 'Événements des 60 dernières minutes' : 'Actions opérateur les plus récentes';
        fetch(url).then(r => r.json()).then(data => updateLogsTable(data, title, sub));
    }

    function updateLogsTable(logs, title, subtitle) {
        lastLogsData = logs;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalSubtitle').innerText = subtitle || '';
        const container = document.getElementById('logsContainer');

        if (!logs || logs.length === 0) {
            container.innerHTML = `
                <div class="logs-empty">
                    <div class="logs-empty-icon">&#9888;</div>
                    <p>Aucune donnée enregistrée pour cette sélection.</p>
                </div>`;
            return;
        }

        const rows = logs.map(log => {
            const date = new Date(log.timestamp).toLocaleString('fr-FR');
            const isTelemetry = log.eventType === 'TELEMETRY';
            const isAction = ['TOGGLE', 'REPAIR', 'UPDATE'].includes(log.eventType);
            const badgeClass = isTelemetry ? 'telemetry' : (isAction ? 'action' : 'other');
            const opCell = log.operatorName
                ? `<span class="log-op">${log.operatorName}</span>`
                : `<span class="log-sys">SYSTEM</span>`;

            return `
            <tr>
                <td class="log-date">${date}</td>
                <td><span class="log-badge ${badgeClass}">${log.eventType}</span></td>
                <td>${opCell}</td>
                <td class="log-metric">${log.metricName || '—'}</td>
                <td class="log-old">${log.oldNumericValue ?? log.oldStringValue ?? '—'}</td>
                <td class="log-new">${log.newNumericValue ?? log.newStringValue ?? '—'}</td>
            </tr>`;
        }).join('');

        container.innerHTML = `
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Événement</th>
                        <th>Opérateur</th>
                        <th>Métrique</th>
                        <th>Ancien</th>
                        <th>Nouveau</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    function generateLogReport() {
        if (!lastLogsData || lastLogsData.length === 0) {
            alert("Aucune donnée à exporter.");
            return;
        }

        let reportText = "";
        const totalLines = lastLogsData.length;
        const repairs = lastLogsData.filter(l => l.eventType === 'REPAIR').length;
        const fmt = (n) => Number.isInteger(n) ? n : n.toFixed(2);

        if (currentOpenDeviceId) {
            const deviceId = currentOpenDeviceId;
            const card = document.getElementById('device-card-' + deviceId);

            let name = "Inconnu";
            let type = "Inconnu";
            let status = "Inconnu";
            let room = document.querySelector('.editable-zone-name')?.innerText || "Station";

            if (card) {
                name = card.querySelector('.article-title')?.innerText || "Inconnu";
                type = card.querySelector('span[style*="color: var(--color-9)"]')?.innerText || "Inconnu";
                const statusText = card.querySelector('[id^="status-text-"]')?.innerText || "";
                status = statusText.replace("Statut: ", "").trim();
            }

            reportText = `DEVICE #${deviceId}\n` +
                `ID: ${deviceId}\n` +
                `Name: ${name}\n` +
                `Type: ${type}\n` +
                `Status: ${status}\n` +
                `Room: ${room}\n\n` +
                `--- SUMMARY ---\n` +
                `Log entries analyzed: ${totalLines}\n` +
                `Repairs: ${repairs}\n\n`;

            const metrics = {};
            lastLogsData.forEach(log => {
                if (log.eventType === 'TELEMETRY' && log.metricName && (log.newNumericValue !== null && log.newNumericValue !== undefined)) {
                    if (!metrics[log.metricName]) metrics[log.metricName] = [];
                    metrics[log.metricName].push(log.newNumericValue);
                }
            });

            const metricKeys = Object.keys(metrics);
            if (metricKeys.length > 0) {
                reportText += `--- METRICS ANALYSES ---\n`;
                metricKeys.forEach(key => {
                    const values = metrics[key];
                    const min = Math.min(...values);
                    const max = Math.max(...values);
                    const avg = values.reduce((a, b) => a + b, 0) / values.length;
                    reportText += `[${key}]\n` +
                        `  Minimum: ${fmt(min)}\n` +
                        `  Maximum: ${fmt(max)}\n` +
                        `  Average: ${fmt(avg)}\n`;
                });
            } else {
                reportText += `HISTORIQUE DES ÉVÉNEMENTS :\n`;
            }

            lastLogsData.forEach(log => {
                const date = new Date(log.timestamp).toLocaleString('fr-FR');
                reportText += `[${date}] ${log.eventType} | Opérateur: ${log.operatorName || 'SYSTEM'} | Metric: ${log.metricName || '-'} | Old: ${log.oldNumericValue ?? log.oldStringValue ?? '-'} | New: ${log.newNumericValue ?? log.newStringValue ?? '-'}\n`;
            });
        } else {
            reportText = "RAPPORT GLOBAL DE LA STATION\n";
            reportText += "Date: " + new Date().toLocaleString('fr-FR') + "\n";
            reportText += `Log entries analyzed: ${totalLines}\n`;
            reportText += `Repairs: ${repairs}\n`;
            reportText += "----------------------------\n\n";

            const deviceStates = {};

            lastLogsData.forEach(log => {
                if (log.eventType === 'TELEMETRY' && log.newNumericValue !== null) {
                    const dId = log.device?.id;
                    if (!dId) return;

                    if (!deviceStates[dId]) {
                        deviceStates[dId] = {
                            zone: log.device?.zoneName || "Inconnue",
                            prod: 0,
                            cons: 0
                        };
                    }

                    if (log.metricName === 'PRODUCTION_VALUE' && deviceStates[dId].prod === 0) {
                        deviceStates[dId].prod = log.newNumericValue;
                    }
                    if (log.metricName === 'CONSUMPTION_VALUE' && deviceStates[dId].cons === 0) {
                        deviceStates[dId].cons = log.newNumericValue;
                    }
                }
            });

            const zoneTotals = {};
            let totalGlobalProd = 0;
            let totalGlobalCons = 0;

            Object.values(deviceStates).forEach(state => {
                if (!zoneTotals[state.zone]) zoneTotals[state.zone] = { prod: 0, cons: 0 };
                zoneTotals[state.zone].prod += state.prod;
                zoneTotals[state.zone].cons += state.cons;
                totalGlobalProd += state.prod;
                totalGlobalCons += state.cons;
            });

            const zoneNames = Object.keys(zoneTotals).sort();
            if (zoneNames.length > 0) {
                reportText += "BILAN ÉNERGÉTIQUE :\n";
                zoneNames.forEach(zName => {
                    const stats = zoneTotals[zName];
                    reportText += `   - ${zName}: Prod ${stats.prod.toFixed(2)} GW | Cons ${stats.cons.toFixed(2)} GW\n`;
                });
                reportText += `Production Totale: ${totalGlobalProd.toFixed(2)} GW\n`;
                reportText += `Consommation Totale: ${totalGlobalCons.toFixed(2)} GW\n`;
                reportText += "----------------------------\n\n";
            }

            const metrics = {};
            lastLogsData.forEach(log => {
                if (log.eventType === 'TELEMETRY' && log.metricName && (log.newNumericValue !== null && log.newNumericValue !== undefined)) {
                    if (!metrics[log.metricName]) metrics[log.metricName] = [];
                    metrics[log.metricName].push(log.newNumericValue);
                }
            });

            const metricKeys = Object.keys(metrics);
            if (metricKeys.length > 0) {
                reportText += `RÉSUMÉ DES MÉTRIQUES :\n`;
                metricKeys.forEach(key => {
                    const values = metrics[key];
                    const min = Math.min(...values);
                    const max = Math.max(...values);
                    const avg = values.reduce((a, b) => a + b, 0) / values.length;
                    reportText += `[${key}] Min: ${fmt(min)} | Max: ${fmt(max)} | Avg: ${fmt(avg)}\n`;
                });
                reportText += "\n";
            }

            reportText += "HISTORIQUE DES ÉVÉNEMENTS :\n";

            lastLogsData.forEach(log => {
                const date = new Date(log.timestamp).toLocaleString('fr-FR');
                reportText += `[${date}] ${log.eventType} | Opérateur: ${log.operatorName || 'SYSTEM'} | Metric: ${log.metricName || '-'} | Old: ${log.oldNumericValue ?? log.oldStringValue ?? '-'} | New: ${log.newNumericValue ?? log.newStringValue ?? '-'}\n`;
            });
        }

        const blob = new Blob([reportText], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentOpenDeviceId ? `report-device-${currentOpenDeviceId}.txt` : `report-global.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function closeLogsModal() {
        document.getElementById('logsModal').style.display = 'none';
        currentOpenDeviceId = null;
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeLogsModal();
    });

    document.getElementById('logsModal').addEventListener('click', function (e) {
        if (e.target === this) closeLogsModal();
    });

    let sensorFilterActive = false;

    function toggleSensorFilter() {
        sensorFilterActive = !sensorFilterActive;
        const btn = document.getElementById('filterSensorBtn');
        if (sensorFilterActive) {
            btn.classList.add('active-filter');
        } else {
            btn.classList.remove('active-filter');
        }
        applyDeviceFilters();
    }

    function applyDeviceFilters() {
        const keyword      = (document.getElementById('deviceSearchInput').value || '').toLowerCase().trim();
        const statusFilter = document.getElementById('statusFilterSelect').value;
        const cards        = document.querySelectorAll('.device-item');
        let visible        = 0;

        cards.forEach(card => {
            const name     = (card.dataset.name   || '').toLowerCase();
            const status   = card.dataset.status  || '';
            const isSensor = card.dataset.isSensor === 'true';

            const matchesSearch = !keyword       || name.includes(keyword);
            const matchesStatus = !statusFilter  || status === statusFilter;
            const matchesSensor = !sensorFilterActive || isSensor;

            if (matchesSearch && matchesStatus && matchesSensor) {
                card.style.display = '';
                visible++;
            } else {
                card.style.display = 'none';
            }
        });

        const noResult = document.getElementById('noDeviceResult');
        noResult.style.display = (visible === 0 && cards.length > 0) ? 'block' : 'none';
    }

    document.getElementById('deviceSearchInput').addEventListener('keyup', applyDeviceFilters);

    const STATUS_CLASS_MAP = {
        'ONLINE':      'ONLINE',
        'OFFLINE':     'OFFLINE',
        'MAINTENANCE': 'MAINTENANCE'
    };

    function extractStatusFromEl(el) {
        for (const cls of Object.keys(STATUS_CLASS_MAP)) {
            if (el.classList.contains(cls)) return STATUS_CLASS_MAP[cls];
        }
        return null;
    }

    function observeStatusEl(statusEl) {
        const observer = new MutationObserver(() => {
            const newStatus = extractStatusFromEl(statusEl);
            if (!newStatus) return;

            const card = statusEl.closest('.device-item');
            if (!card) return;

            const oldStatus = card.dataset.status;
            if (oldStatus === newStatus) return;

            card.dataset.status = newStatus;

            card.style.transition = 'box-shadow 0.3s ease';
            card.style.boxShadow  = newStatus === 'ONLINE'
                ? '0 0 18px 4px rgba(0, 229, 100, 0.55)'
                : newStatus === 'OFFLINE'
                    ? '0 0 18px 4px rgba(229, 50, 50, 0.55)'
                    : '0 0 18px 4px rgba(255, 165, 0, 0.55)';

            setTimeout(() => { card.style.boxShadow = ''; }, 1200);

            applyDeviceFilters();
        });

        observer.observe(statusEl, { attributes: true, attributeFilter: ['class'] });
    }

    document.querySelectorAll('[id^="status-text-"]').forEach(observeStatusEl);
</script>

</body>
