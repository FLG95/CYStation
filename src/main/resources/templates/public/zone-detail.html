<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="'Détail Zone - ' + ${zone.name}">CYStation - Détail Zone</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/zone-detail.css}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>
</head>
<body class="bg-dark">

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">
    <section class="section-header">
        <h1 th:text="${zone.name}"
            contenteditable="true"
            class="editable-zone-name"
            th:onblur="|updateZoneAjax(${zone.id}, this, 'name')|">
        </h1>
        <p th:text="${zone.description != null ? zone.description : 'Ajouter une description...'}"
           contenteditable="true"
           class="editable-zone-desc"
           th:onblur="|updateZoneAjax(${zone.id}, this, 'description')|">
        </p>
    </section>

    <div class="infrastructure-grid">
        <th:block th:each="device : ${zone.devices}">
            <div class="infra-card" th:id="'device-card-' + ${device.id}">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600" alt="Device">

                <div class="infra-overlay">
                    <div class="device-header-info">
                        <h3 th:text="${device.name}"></h3>
                        <span class="device-type-badge" th:text="${device.deviceDisplayName}"></span>
                    </div>

                    <p th:id="'status-text-' + ${device.id}" th:text="${device.status.displayValue}"></p>

                    <div class="device-controls">
                        <button type="button"
                                th:id="'btn-' + ${device.id}"
                                th:onclick="'toggleDeviceAjax(' + ${device.id} + ')'"
                                th:class="${device.status.name() == 'ONLINE' ? 'btn-toggle off' : 'btn-toggle on'}"
                                th:disabled="${device.status.name() == 'MAINTENANCE'}"
                                th:text="${device.status.name() == 'ONLINE' ? 'Éteindre' : 'Allumer'}">
                        </button>

                        <button type="button"
                                th:id="'btn-repair-' + ${device.id}"
                                th:data-device-id="${device.id}"
                                th:data-category-code="${device.deviceCategoryCode}"
                                onclick="repairDeviceAjax(this.getAttribute('data-device-id'), this.getAttribute('data-category-code'))"
                                class="btn-repair"
                                th:style="${device.status.name() == 'MAINTENANCE' ? 'display:block' : 'display:none'}">
                            Réparer
                        </button>
                    </div>

                    <button type="button" class="cnes-btn btn-full"
                            th:onclick="'deleteDeviceAjax(' + ${device.id} + ')'">
                        Supprimer
                    </button>
                </div>
            </div>
        </th:block>

        <a th:href="'#addDeviceModal-' + ${zone.id}" class="infra-card add-card">
            <h3>&#10010;<br>Ajouter un appareil</h3>
        </a>
    </div>
</main>

<div th:id="'addDeviceModal-' + ${zone.id}" class="modal">
    <div class="modal-content cnes-form">
        <a href="#!" class="close-btn">&#10006;</a>
        <h2>Déployer un module dans <span th:text="${zone.name}"></span></h2>

        <form th:action="@{/mission/device/create}" method="post">
            <input type="hidden" name="zoneId" th:value="${zone.id}">

            <label>Nom du module</label>
            <input type="text" name="name" required>

            <label>Type de système</label>
            <select name="deviceType" required>
                <option value="CO2_SENSOR">Capteur CO2</option>
                <option value="GENERATOR">Générateur</option>
                <option value="RADAR">Radar</option>
                <option value="RADIO">Radio</option>
            </select>

            <button type="submit" class="cnes-btn btn-full">Confirmer</button>
        </form>
    </div>
</div>

<div id="gameModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <iframe id="gameFrame" src="" frameborder="0" style="width: 100%; height: 600px;"></iframe>
    </div>
</div>

<div th:replace="~{public/footer :: footer}"></div>
</body>
</html>
