<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profils - CYStation</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/about.css}">
    <link rel="stylesheet" th:href="@{/css/profiles.css}">
</head>

<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <section class="cnes-hero" id="hero-about">
        <div class="cnes-hero-content">
            <span class="tag">Équipage</span>
            <h1>Membres de l'équipage</h1>
            <p>Consultez les informations détaillées et la progression des membres de l'expédition.</p>
        </div>
    </section>

    <section class="cnes-section">
        <div class="cnes-grid news-grid">

            <article class="cnes-card" th:each="u : ${usersList}">
                <div class="card-image">
                    <img th:src="@{/images/avatars/{name}(name=${u.profilePicture})}" alt="Avatar de l'équipage">
                </div>
                <div class="card-content">
                    <span class="card-date" th:text="${u.role.displayValue}">Rôle</span>
                    <h3 th:text="${u.firstName + ' ' + u.lastName}">Prénom Nom</h3>
                    <p>Email : <span th:text="${u.email}">email@cyss.space</span></p>
                    <p>Expérience : <span th:text="${u.experience}">0</span> EXP</p>

                    <div class="exp-bar-container">
                        <div class="progress">
                            <div class="progress-bar" th:style="'width: ' + ${u.experience % 100} + '%'"></div>
                        </div>
                    </div>

                    <div style="margin-top: 20px;">
                        <a th:href="@{/profile/{email}(email=${u.email})}" class="btn-view" style="display: inline-block; padding: 10px 15px; background: var(--cnes-red); color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Voir Profil</a>
                    </div>
                </div>
            </article>

        </div>
    </section>

</main>

<div th:replace="~{public/footer :: footer}"></div>

</body>
</html>
