<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CYStation - Mission</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/mission.css}">
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <section class="cnes-hero">
        <div class="cnes-hero-content">
            <span class="tag">Administration Spatiale</span>
            <h1>Gestion des Zones</h1>
            <p>Cartographie des modules de la station.</p>
        </div>
    </section>

    <section class="cnes-section bg-dark-alt">
        <div class="section-header">
            <h2>Réseau des zones actives</h2>
        </div>

        <div class="cnes-grid infrastructure-grid">
            <th:block th:if="${not #lists.isEmpty(zones)}">
                <div class="infra-card" th:each="zone : ${zones}">
                    <img src="https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?auto=format&fit=crop&w=600&q=80" alt="Zone">
                    <div class="infra-overlay">
                        <h3 th:text="${zone.name}">Nom de la zone</h3>
                        <div style="font-size: 0.8rem; margin-top: 10px; color: #00e5ff;">
                            <span th:each="device : ${zone.devices}" th:text="${device.name} + ' '"></span>
                        </div>
                    </div>
                </div>
            </th:block>

            <a href="#zoneModal" class="infra-card add-card">
                <div class="infra-overlay admin-overlay">
                    <h3>&#10010;<br>Rajouter une zone</h3>
                </div>
            </a>

            <div th:if="${#lists.isEmpty(zones)}" class="empty-state">
                <em>Aucun module enregistré.</em>
            </div>
        </div>
    </section>

    <div id="zoneModal" class="modal">
        <div class="modal-content cnes-form">
            <a href="#" class="close-btn">&#10006;</a>
            <div class="section-header">
                <h2>Initialiser un module</h2>
            </div>
            <form id="createZoneForm" th:action="@{/mission/zone/create}" method="post">
                <label for="zoneName">Désignation du module &#10142;</label>
                <input type="text" id="zoneName" name="name" placeholder="Ex: Secteur Gamma" required>

                <label>Appareils à bord &#10142;</label>
                <div id="device-inputs">
                    <input type="text" name="deviceNames" placeholder="Nom de l'appareil (ex: Antenne)">
                </div>

                <button type="button" class="cnes-btn" style="background: transparent; border: 1px solid var(--color-7); color: var(--color-7); margin-bottom: 20px; width: 100%;" onclick="addDevice()">
                    + Ajouter un autre appareil
                </button>

                <button type="submit" class="cnes-btn btn-full">Confirmer le déploiement</button>
            </form>
        </div>
    </div>

</main>

<div th:replace="~{public/footer :: footer}"></div>

<script>
    function addDevice() {
        const container = document.getElementById('device-inputs');
        const input = document.createElement('input');
        input.type = 'text';
        input.name = 'deviceNames';
        input.placeholder = 'Autre appareil...';
        input.style.marginTop = '5px';
        container.appendChild(input);
    }
</script>

</body>
</html>
