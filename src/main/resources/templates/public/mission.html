<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CYStation - Mission</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/mission.css}">
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <section class="cnes-hero">
        <div class="cnes-hero-content">
            <span class="tag">Administration Spatiale</span>
            <h1>Gestion des Zones</h1>
            <p>Cartographie des modules de la station.</p>
        </div>
    </section>

    <section class="cnes-section bg-dark-alt">
        <div class="section-header">
            <h2>Réseau des zones actives</h2>
        </div>

        <div class="error-message" th:if="${param.error}">
            <strong>Erreur :</strong> Cette Zone existe déjà.
        </div>

        <div class="cnes-grid infrastructure-grid">



            <th:block th:if="${not #lists.isEmpty(zones)}">
                <a th:href="'#zoneDetailsModal-' + ${zone.id}" class="infra-card" th:each="zone : ${zones}">
                    <img src="https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?auto=format&fit=crop&w=600&q=80" alt="Zone">
                    <div class="infra-overlay">
                        <h3 th:text="${zone.name}"></h3>
                    </div>
                </a>
            </th:block>

            <a href="#createZoneModal" class="infra-card add-card">
                <div class="infra-overlay admin-overlay">
                    <h3>&#10010;<br>Rajouter une zone</h3>
                </div>
            </a>

            <div th:if="${#lists.isEmpty(zones)}" class="empty-state">
                <em>Aucun module enregistré.</em>
            </div>
        </div>
    </section>

    <div th:each="zone : ${zones}" th:id="'zoneDetailsModal-' + ${zone.id}" class="modal">
        <div class="modal-content modal-large">
            <a href="#" class="close-btn">&#10006;</a>
            <div class="section-header">
                <h2 th:text="'Appareils dans ' + ${zone.name}"></h2>
            </div>

            <div class="cnes-grid infrastructure-grid">
                <th:block th:if="${not #lists.isEmpty(zone.devices)}">
                    <div class="infra-card" th:each="device : ${zone.devices}">
                        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80" alt="Machine">
                        <div class="infra-overlay">
                            <h3 th:text="${device.name}"></h3>
                            <p th:text="${device.status}" style="margin-top: 5px; font-size: 0.9em; opacity: 0.8;"></p>
                        </div>
                    </div>
                </th:block>

                <a th:href="'#addDeviceModal-' + ${zone.id}" class="infra-card add-card">
                    <div class="infra-overlay admin-overlay">
                        <h3>&#10010;<br>Rajouter un appareil</h3>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div th:each="zone : ${zones}" th:id="'addDeviceModal-' + ${zone.id}" class="modal">
        <div class="modal-content cnes-form">
            <a th:href="'#zoneDetailsModal-' + ${zone.id}" class="close-btn">&#10006;</a>
            <div class="section-header">
                <h2>Ajouter un appareil dans <span style="color: #00e5ff;" th:text="${zone.name}"></span></h2>
            </div>
            <form th:action="@{/mission/device/create}" method="post">
                <input type="hidden" name="zoneId" th:value="${zone.id}">

                <label th:for="'deviceName-' + ${zone.id}">Désignation de l'appareil &#10142;</label>
                <input type="text" th:id="'deviceName-' + ${zone.id}" name="name" required>

                <label th:for="'deviceType-' + ${zone.id}">Type de module &#10142;</label>
                <select th:id="'deviceType-' + ${zone.id}" name="typeAppareil" required>
                    <option value="CO2_SENSOR">Capteur CO2</option>
                </select>

                <button type="submit" class="cnes-btn btn-full">
                    Déployer l'appareil
                </button>
            </form>
        </div>
    </div>

    <div id="createZoneModal" class="modal">
        <div class="modal-content cnes-form">
            <a href="#" class="close-btn">&#10006;</a>
            <div class="section-header">
                <h2>Initialiser une zone</h2>
            </div>
            <form th:action="@{/mission/zone/create}" method="post">
                <label for="newZoneName">Désignation de la nouvelle zone &#10142;</label>
                <input type="text" id="newZoneName" name="name" required>
                <button type="submit" class="cnes-btn btn-full">
                    Confirmer le déploiement
                </button>
            </form>
        </div>
    </div>

</main>

<div th:replace="~{public/footer :: footer}"></div>

</body>
</html>
