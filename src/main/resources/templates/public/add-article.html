<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un Article</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>
<div th:replace="~{public/header :: header}"></div>

<main class="container" style="padding: 50px 20px; max-width: 800px; margin: auto;">
    <h1>Créer un nouvel article</h1>
    <form th:action="@{/article/add}" method="post" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label>Titre principal :</label><br>
            <input type="text" name="title" required style="width: 100%; padding: 8px;">
        </div>
        <div>
            <label>Sous-titre :</label><br>
            <input type="text" name="subtitle" required style="width: 100%; padding: 8px;">
        </div>
        <div>
            <label>Contenu de l'article :</label><br>
            <textarea name="articleText" rows="10" required style="width: 100%; padding: 8px;"></textarea>
        </div>
        <button type="submit" class="cnes-btn" style="width: fit-content; background-color: #3498db;">Publier l'article</button>
    </form>
</main>

<div th:replace="~{public/footer :: footer}"></div>
</body>
</html>
