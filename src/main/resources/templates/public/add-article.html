<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CYStation - Terminal de Rapport</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/add-article.css}">
</head>
<body class="cnes-layout">

<div th:replace="~{public/header :: header}"></div>

<main class="space-bg">
    <div class="mission-terminal">
        <div class="terminal-header">
            <span class="status-blink"></span>
            <span class="terminal-title">Console d'enregistrement de mission</span>
        </div>

        <form th:action="@{/article/add}" th:object="${article}" method="post" class="terminal-body">
            <div class="input-row">
                <div class="input-group">
                    <label for="title">Titre de l'article</label>
                    <input type="text" id="title" th:field="*{title}" placeholder="Titre de l'article" required>
                </div>
                <div class="input-group">
                    <label for="subtitle">Auteur</label>
                    <input type="text" id="subtitle" th:field="*{subtitle}" placeholder="Auteur" required>
                </div>
            </div>

            <div class="input-group">
                <label for="imageUrl">Flux visuel (URL de l'image)</label>
                <input type="url" id="imageUrl" th:field="*{imageUrl}" placeholder="https://lien-vers-image.jpg">
            </div>

            <div class="input-group">
                <label for="articleText">Données du rapport</label>
                <textarea id="articleText" th:field="*{articleText}" rows="12" placeholder="Saisissez le contenu ici..." required></textarea>
            </div>

            <div class="terminal-actions">
                <button type="submit" class="cnes-btn-active">Transmettre au centre de commande</button>
                <a th:href="@{/}" class="cnes-btn-ghost">Annuler la transmission</a>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{public/footer :: footer}"></div>

</body>
</html>
