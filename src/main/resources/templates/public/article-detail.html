<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${article.title}">CYStation - Article</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/article-detail.css}">
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">

    <section class="cnes-hero article-hero" th:style="${article.imageUrl != null and !article.imageUrl.isEmpty() ? 'background-image: url(' + article.imageUrl + ');' : 'background-image: url(https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80);'}">
        <div class="cnes-hero-content">
            <span class="tag" th:text="${#temporals.format(article.date, 'dd/MM/yyyy HH:mm')}"></span>
            <h1 th:text="${article.title}"></h1>
            <p th:text="${article.subtitle}"></p>
            <!-- ← NOUVEAU : type affiché sous l'auteur -->
            <span class="tag type-tag"
                  th:if="${article.type != null and !article.type.isEmpty()}"
                  th:text="${article.type}">
            </span>
        </div>
    </section>

    <section class="cnes-section">
        <div class="article-text-section">
            <div class="article-body" th:text="${article.articleText}"></div>

            <div class="article-actions">
                <a th:href="@{/}" class="cnes-btn">Retour à l'accueil</a>
                <a th:href="@{/articles}" class="cnes-btn" style="background-color: var(--color-3); border-color: var(--color-3);">Tous les articles</a>
            </div>
        </div>
    </section>

</main>

<div th:replace="~{public/footer :: footer}"></div>

</body>
</html>
