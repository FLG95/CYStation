<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>CYStation - Mission</title>
    <link rel="icon" type="image/png" th:href="@{/img/meatlogo.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/zone-overview.css}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/device-actions.js}" defer></script>
    <script th:src="@{/js/device-sync.js}" defer></script>
</head>
<body class="mission-page">

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">
    <section class="cnes-section">

        <div class="glass-header">
            <div class="title-group">
                <a th:href="@{/mission}" class="breadcrumb-link">
                    <h2>Infrastructures du Complexe</h2>
                </a>
                <span class="subtitle">Gérer les modules de la station</span>
            </div>

            <div style="display: flex; gap: 15px; align-items: center;">
                <button onclick="openGlobalLogs()" class="cnes-btn" style="background-color: var(--color-9); color: black; font-weight: bold; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">
                    Journal de Bord Global
                </button>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Localiser une zone...">
                </div>
            </div>
        </div>

        <div class="cnes-grid news-grid" id="zonesGrid">
            <article class="infra-card zone-item" th:each="zone : ${zones}">
                <a th:href="@{/mission/zone/{id}(id=${zone.id})}" class="card-link">
                    <div class="image-container">
                        <img th:src="${zone.imageUrl != null && !zone.imageUrl.isEmpty() ? zone.imageUrl : '/img/default-zone.jpg'}"
                             th:alt="${zone.name}">
                        <div class="status-badge">Opérationnel</div>
                    </div>

                    <div class="infra-overlay">
                        <h3 class="zone-title" th:text="${zone.name}"></h3>
                        <div class="zone-stats">
                            <span class="stat-icon">&#9881;</span>
                            <p class="zone-info" th:text="${#lists.size(zone.devices)} + ' modules détectés'"></p>
                        </div>
                        <div class="card-footer">
                            <span>Accéder au terminal</span>
                            <span class="arrow">&#8594;</span>
                        </div>
                    </div>
                </a>
            </article>
        </div>

        <div id="noResult" class="empty-state" style="display:none;">
            <div class="empty-icon">[!]</div>
            <p>Aucune zone ne correspond à votre recherche dans la base de données.</p>
        </div>
    </section>
</main>

<div id="logsModal" class="modal-overlay">
    <div class="logs-modal-panel">
        <div class="logs-modal-header">
            <div class="logs-modal-title">
                <h2 id="modalTitle">Historique Global</h2>
                <span class="logs-modal-subtitle" id="modalSubtitle">Vue globale de la station</span>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button class="logs-download-btn" onclick="generateLogReport()" title="Générer Rapport .txt">&#10515;</button>
                <button class="logs-close-btn" onclick="closeLogsModal()" aria-label="Fermer">&times;</button>
            </div>
        </div>

        <div class="logs-nav">
            <button id="btn-live" class="logs-nav-btn active" onclick="refreshGlobalLogs(); setActiveNav(this)">
                Live Station
            </button>
            <button class="logs-nav-btn" onclick="showReport('hour'); setActiveNav(this)">
                Dernière Heure
            </button>
            <button class="logs-nav-btn" onclick="showReport('recent'); setActiveNav(this)">
                50 Dernières Actions
            </button>
        </div>

        <div class="logs-body">
            <div id="logsContainer"></div>
        </div>
    </div>
</div>

<script>
    const searchInput = document.getElementById('searchInput');
    const noResult    = document.getElementById('noResult');

    function filterZones() {
        const keyword = searchInput.value.toLowerCase().trim();
        const zones   = document.querySelectorAll('.zone-item');
        let visible   = 0;

        zones.forEach(zone => {
            const name = (zone.querySelector('.zone-title')?.textContent || '').toLowerCase();

            if (!keyword || name.includes(keyword)) {
                zone.style.display = '';
                visible++;
            } else {
                zone.style.display = 'none';
            }
        });

        noResult.style.display = (visible === 0 && zones.length > 0) ? 'block' : 'none';
    }

    searchInput.addEventListener('keyup', filterZones);

    let lastLogsData = [];

    function setActiveNav(btn) {
        document.querySelectorAll('.logs-nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openGlobalLogs() {
        document.getElementById('btn-live').innerText = '► Live — Station Entière';
        document.getElementById('logsModal').style.display = 'flex';
        document.querySelectorAll('.logs-nav-btn').forEach((b,i) => b.classList.toggle('active', i === 0));
        refreshGlobalLogs();
    }

    function refreshGlobalLogs() {
        fetch('/admin/reports/last-hour')
            .then(r => r.json())
            .then(data => updateLogsTable(data, 'Station Entière', 'Vue globale de la station'));
    }

    function showReport(type) {
        const baseUrl = type === 'hour' ? '/admin/reports/last-hour' : '/admin/reports/recent-actions';
        const title   = type === 'hour' ? 'Dernière Heure - Station' : '50 Dernières Actions - Station';
        const sub     = type === 'hour' ? 'Événements des 60 dernières minutes' : 'Actions opérateur les plus récentes';
        fetch(baseUrl).then(r => r.json()).then(data => updateLogsTable(data, title, sub));
    }

    function updateLogsTable(logs, title, subtitle) {
        lastLogsData = logs;
        document.getElementById('modalTitle').innerText    = title;
        document.getElementById('modalSubtitle').innerText = subtitle || '';
        const container = document.getElementById('logsContainer');

        if (!logs || logs.length === 0) {
            container.innerHTML = '<div class="logs-empty"><div class="logs-empty-icon">[!]</div><p>Aucune donnée enregistrée pour cette sélection.</p></div>';
            return;
        }

        const rows = logs.map(log => {
            const date        = new Date(log.timestamp).toLocaleString('fr-FR');
            const isTelemetry = log.eventType === 'TELEMETRY';
            const isAction    = ['TOGGLE','REPAIR','UPDATE'].includes(log.eventType);
            const badgeClass  = isTelemetry ? 'telemetry' : (isAction ? 'action' : 'other');
            const opCell      = log.operatorName
                ? '<span class="log-op">' + log.operatorName + '</span>'
                : '<span class="log-sys">SYSTEM</span>';

            return '<tr>' +
                '<td class="log-date">' + date + '</td>' +
                '<td><span class="log-badge ' + badgeClass + '">' + log.eventType + '</span></td>' +
                '<td>' + opCell + '</td>' +
                '<td class="log-metric">' + (log.metricName || '-') + '</td>' +
                '<td class="log-old">' + (log.oldNumericValue ?? log.oldStringValue ?? '-') + '</td>' +
                '<td class="log-new">' + (log.newNumericValue ?? log.newStringValue ?? '-') + '</td>' +
                '</tr>';
        }).join('');

        container.innerHTML = '<table class="logs-table">' +
            '<thead>' +
            '<tr>' +
            '<th>Date</th>' +
            '<th>Événement</th>' +
            '<th>Opérateur</th>' +
            '<th>Métrique</th>' +
            '<th>Ancien</th>' +
            '<th>Nouveau</th>' +
            '</tr>' +
            '</thead>' +
            '<tbody>' + rows + '</tbody>' +
            '</table>';
    }

    function generateLogReport() {
        if (!lastLogsData || lastLogsData.length === 0) {
            alert("Aucune donnée à exporter.");
            return;
        }

        const totalLines = lastLogsData.length;
        const repairs = lastLogsData.filter(l => l.eventType === 'REPAIR').length;

        let reportText = "RAPPORT GLOBAL DE LA STATION\n";
        reportText += "Date: " + new Date().toLocaleString('fr-FR') + "\n";
        reportText += `Log entries analyzed: ${totalLines}\n`;
        reportText += `Repairs: ${repairs}\n`;
        reportText += "----------------------------\n\n";

        const metrics = {};
        lastLogsData.forEach(log => {
            if (log.eventType === 'TELEMETRY' && log.metricName && (log.newNumericValue !== null && log.newNumericValue !== undefined)) {
                if (!metrics[log.metricName]) metrics[log.metricName] = [];
                metrics[log.metricName].push(log.newNumericValue);
            }
        });

        const metricKeys = Object.keys(metrics);
        if (metricKeys.length > 0) {
            const fmt = (n) => Number.isInteger(n) ? n : n.toFixed(2);
            reportText += `RÉSUMÉ DES MÉTRIQUES :\n`;
            metricKeys.forEach(key => {
                const values = metrics[key];
                const min = Math.min(...values);
                const max = Math.max(...values);
                const avg = values.reduce((a, b) => a + b, 0) / values.length;
                reportText += `[${key}] Min: ${fmt(min)} | Max: ${fmt(max)} | Avg: ${fmt(avg)}\n`;
            });
            reportText += "\n";
        }

        reportText += "HISTORIQUE DES ÉVÉNEMENTS :\n";

        lastLogsData.forEach(log => {
            const date = new Date(log.timestamp).toLocaleString('fr-FR');
            reportText += `[${date}] ${log.eventType} | Opérateur: ${log.operatorName || 'SYSTEM'} | Metric: ${log.metricName || '-'} | Old: ${log.oldNumericValue ?? log.oldStringValue ?? '-'} | New: ${log.newNumericValue ?? log.newStringValue ?? '-'}\n`;
        });

        const blob = new Blob([reportText], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `report-global.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function closeLogsModal() {
        document.getElementById('logsModal').style.display = 'none';
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeLogsModal();
    });

    document.getElementById('logsModal').addEventListener('click', function(e) {
        if (e.target === this) closeLogsModal();
    });
</script>
<div th:replace="~{public/footer :: footer}"></div>
</body>
</html>
