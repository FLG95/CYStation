<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

    <main>
        <form th:action="@{/register}" th:object="${user}" method="post">
            <input type="text" th:field="*{firstName}" placeholder="Prénom" />
            <input type="text" th:field="*{lastName}" placeholder="Nom" />
            <div class="form-group">
                <label for="gender">Genre :</label>
                <select th:field="*{gender}" id="gender" class="form-control" required>
                    <option value="">-- Choisir un genre --</option>
                    <option th:each="g : ${T(io.squid.CyStation.model.Gender).values()}"
                            th:value="${g}"
                            th:text="${g.displayValue}">
                    </option>
                </select>
            </div>
            <input type="email" th:field="*{email}" placeholder="Email" />
            <input type="password" th:field="*{password}" placeholder="Mot de passe" />
            <button type="submit">S'inscrire</button>
        </form>

        <div th:if="${param.error}">
            <strong>Erreur :</strong> Cet email est déjà utilisé
            <br>
            <a th:href="@{/login}" >veuillez vous connecter ici</a>.
        </div>

    </main>

</body>
</html>
