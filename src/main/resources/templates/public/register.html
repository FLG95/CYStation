<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - CYStation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body class="space-theme">

<div th:replace="~{public/header :: header}"></div>

<main class="register-main-container">
    <div class="stars-overlay"></div>

    <div class="register-card">
        <div class="register-header">
            <h2>Rejoindre l'équipage</h2>
            <p>Initialisation de votre profil orbital</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="register-form">

            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Prénom</label>
                    <input type="text" id="firstName" th:field="*{firstName}" placeholder="Ex: Jean" required/>
                </div>
                <div class="form-group">
                    <label for="lastName">Nom</label>
                    <input type="text" id="lastName" th:field="*{lastName}" placeholder="Ex: Dupont" required/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="gender">Genre</label>
                    <select th:field="*{gender}" id="gender" required>
                        <option value="">-- Choisir --</option>
                        <option th:each="g : ${T(io.squid.CyStation.enums.Gender).values()}"
                                th:value="${g}"
                                th:text="${g.displayValue}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="birthDate">Date de naissance</label>
                    <input type="date" id="birthDate" th:field="*{birthDate}"
                           th:attr="max=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" />
                </div>
            </div>

            <div class="form-group full-width">
                <label for="email">Email de transmissions</label>
                <input type="email" id="email" th:field="*{email}" placeholder="votre.email@cyss.space" required/>
            </div>

            <div class="form-group full-width">
                <label for="password">Code d'accès (Mot de passe)</label>
                <input type="password" id="password" th:field="*{password}" placeholder="••••••••" required/>
            </div>

            <button type="submit" class="btn-submit">S'enrôler maintenant</button>
        </form>

        <div class="error-message" th:if="${param.error}">
            <strong>Erreur :</strong> Ce matricule email est déjà assigné.
        </div>

        <div class="login-link">
            Déjà membre de la station ? <a th:href="@{/login}">Identifiez-vous</a>
        </div>
    </div>
</main>

<div th:replace="~{public/footer :: footer}"></div>

</body>
</html>
