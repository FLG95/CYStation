<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module d'Ingénierie - CYStation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/engineer/reactor.css}">
</head>
<body>

<div th:replace="~{public/header :: header}"></div>

<main class="cnes-layout">
    <section class="cnes-section" style="padding-top: 20px;">
        <div class="section-header" style="margin-bottom: 15px;">
            <h2>Ingénierie & Maintenance</h2>
        </div>

        <div style="text-align: center; max-width: 700px; margin: 0 auto 10px auto; padding: 0 15px;">
            <span style="color: #ff4d4d; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;">Opération Manuelle Requise</span>
            <h3 style="margin: 5px 0; font-size: 1.5rem;">Synchronisation du Réacteur</h3>
            <p style="color: #ccc; line-height: 1.3; font-size: 0.95rem; margin-bottom: 0;">Ajustez le contrôle d'injection manuel pour qu'il corresponde à la fréquence cible générée par l'IA de la station afin de stabiliser le noyau.</p>
        </div>

        <div class="reactor-container" style="padding-top: 0;">
            <div class="machine-console" id="reactor-interface" style="margin-top: 0; width: 100%; max-width: 650px; padding: 25px 30px;">
                <div class="screw top-left"></div>
                <div class="screw top-right"></div>
                <div class="screw bottom-left"></div>
                <div class="screw bottom-right"></div>

                <div class="lcd-screen display-panel" style="margin-bottom: 25px; padding: 15px;">
                    <div id="status-text">ÉTAT : DÉSYNCHRONISÉ</div>
                    <div class="timer-display">MAINTIEN REQUIS : <span id="timer">5.0</span>s</div>
                </div>

                <div class="physical-controls sliders-wrapper">
                    <div class="slider-group" style="margin-bottom: 25px;">
                        <label class="engraved-label" style="margin-bottom: 10px;">FRÉQUENCE CIBLE (IA)</label>
                        <div class="slider-track-bg">
                            <input type="range" id="autoSlider" min="0" max="100" value="0" disabled>
                        </div>
                    </div>

                    <div class="slider-group" style="margin-bottom: 15px;">
                        <label class="engraved-label" style="margin-bottom: 10px;">CALIBRAGE MANUEL</label>
                        <div class="slider-track-bg">
                            <input type="range" id="userSlider" min="0" max="100" value="50">
                        </div>
                    </div>
                </div>

                <button id="submitBtn" class="hardware-btn" style="display: none; margin-top: 15px;">DÉCLENCHER LA SYNCHRONISATION</button>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{public/footer :: footer}"></div>

<script>
    const autoSlider = document.getElementById('autoSlider');
    const userSlider = document.getElementById('userSlider');
    const timerDisplay = document.getElementById('timer');
    const submitBtn = document.getElementById('submitBtn');
    const statusText = document.getElementById('status-text');
    const reactorInterface = document.getElementById('reactor-interface');

    let timeInside = 0;
    const tolerance = 10;
    let targetReached = false;

    function updateAutoSlider() {
        if (targetReached) return;

        const time = Date.now() / 1000;
        const value = (Math.sin(time) + 1) * 50;
        autoSlider.value = value;

        checkCollision();
        requestAnimationFrame(updateAutoSlider);
    }

    function checkCollision() {
        const diff = Math.abs(autoSlider.value - userSlider.value);

        if (diff <= tolerance) {
            timeInside += 16.6;
            userSlider.classList.add('active');
            reactorInterface.classList.add('syncing');
            statusText.innerText = "ÉTAT : ALIGNEMENT EN COURS...";
        } else {
            timeInside = 0;
            userSlider.classList.remove('active');
            reactorInterface.classList.remove('syncing');
            statusText.innerText = "ÉTAT : DÉSYNCHRONISÉ";
        }

        const remaining = Math.max(0, 5 - (timeInside / 1000)).toFixed(1);
        timerDisplay.innerText = remaining;

        if (timeInside >= 5000 && !targetReached) {
            victory();
        }
    }

    function victory() {
        targetReached = true;

        reactorInterface.classList.remove('syncing');
        reactorInterface.classList.add('success');

        submitBtn.style.display = "block";
        statusText.innerText = "ÉTAT : RÉACTEUR STABILISÉ";
    }

    submitBtn.addEventListener('click', () => {
        fetch('/user/update-exp', {
            method: 'POST',
            headers: {
                'Accept': 'application/json'
            }
        })
            .then(response => {
                if (response.ok) {
                    alert("Données transmises avec succès. Points d'expérience ajoutés.");
                    window.location.href = "/userInfo";
                } else {
                    alert("Erreur lors de la transmission des données.");
                }
            })
            .catch(error => console.error('Erreur:', error));
    });

    updateAutoSlider();
</script>

</body>
</html>
