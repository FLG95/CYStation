<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Module d'Ingénierie - CYStation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/engineer/reactor.css}">
</head>
<body>

<main class="cnes-layout">
    <section class="cnes-section reactor-section">
        <div class="section-header reactor-section-header">
            <h2>Ingénierie & Maintenance</h2>
        </div>

        <div class="reactor-header-info">
            <span class="warning-label">Opération Manuelle Requise</span>
            <h3 class="reactor-title">Synchronisation du Réacteur</h3>
            <p class="reactor-desc">Ajustez le contrôle d'injection manuel pour qu'il corresponde à la fréquence cible générée par l'IA de la station afin de stabiliser le noyau.</p>
        </div>

        <div class="reactor-container">
            <div class="machine-console" id="reactor-interface">
                <div class="screw top-left"></div>
                <div class="screw top-right"></div>
                <div class="screw bottom-left"></div>
                <div class="screw bottom-right"></div>

                <div class="lcd-screen display-panel">
                    <div id="status-text">ÉTAT : DÉSYNCHRONISÉ</div>
                    <div class="timer-display">MAINTIEN REQUIS : <span id="timer">5.0</span>s</div>
                </div>

                <div class="physical-controls sliders-wrapper">
                    <div class="slider-group auto-slider-group">
                        <label class="engraved-label">FRÉQUENCE CIBLE (IA)</label>
                        <div class="slider-track-bg">
                            <input type="range" id="autoSlider" min="0" max="100" value="0" disabled>
                        </div>
                    </div>

                    <div class="slider-group user-slider-group">
                        <label class="engraved-label">CALIBRAGE MANUEL</label>
                        <div class="slider-track-bg">
                            <input type="range" id="userSlider" min="0" max="100" value="50">
                        </div>
                    </div>
                </div>

                <button id="submitBtn" class="hardware-btn">DÉCLENCHER LA SYNCHRONISATION</button>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{public/footer :: footer}"></div>

<script>
    const autoSlider = document.getElementById('autoSlider');
    const userSlider = document.getElementById('userSlider');
    const timerDisplay = document.getElementById('timer');
    const submitBtn = document.getElementById('submitBtn');
    const statusText = document.getElementById('status-text');
    const reactorInterface = document.getElementById('reactor-interface');

    let timeInside = 0;
    const tolerance = 10;
    let targetReached = false;

    function updateAutoSlider() {
        if (targetReached) return;

        const time = Date.now() / 1000;
        const value = (Math.sin(time) + 1) * 50;
        autoSlider.value = value;

        checkCollision();
        requestAnimationFrame(updateAutoSlider);
    }

    function checkCollision() {
        const diff = Math.abs(autoSlider.value - userSlider.value);

        if (diff <= tolerance) {
            timeInside += 16.6;
            userSlider.classList.add('active');
            reactorInterface.classList.add('syncing');
            statusText.innerText = "ÉTAT : ALIGNEMENT EN COURS...";
        } else {
            timeInside = 0;
            userSlider.classList.remove('active');
            reactorInterface.classList.remove('syncing');
            statusText.innerText = "ÉTAT : DÉSYNCHRONISÉ";
        }

        const remaining = Math.max(0, 5 - (timeInside / 1000)).toFixed(1);
        timerDisplay.innerText = remaining;

        if (timeInside >= 5000 && !targetReached) {
            victory();
        }
    }

    function victory() {
        targetReached = true;

        reactorInterface.classList.remove('syncing');
        reactorInterface.classList.add('success');

        submitBtn.style.display = "block";
        statusText.innerText = "ÉTAT : RÉACTEUR STABILISÉ";
    }


    submitBtn.addEventListener('click', () => {
        const token = document.querySelector('meta[name="_csrf"]').content;
        const header = document.querySelector('meta[name="_csrf_header"]').content;
        const expAmount = 50;

        fetch('/user/update-exp?amount=' + expAmount, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [header]: token
            }
        })
            .then(response => {
                if (response.ok) {
                    window.location.href = "/userInfo";
                } else {
                    alert("Erreur " + response.status);
                }
            });
    });

    updateAutoSlider();
</script>

</body>
</html>
