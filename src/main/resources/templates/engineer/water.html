<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module d'Ingénierie - Recycleur d'Eau</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/engineer/water.css}">
</head>
<body>

<main class="cnes-layout">
    <section class="cnes-section water-section">
        <div class="section-header water-section-header">
            <h2>Ingénierie & Systèmes de Vie</h2>
        </div>

        <div class="water-header-info">
            <span class="warning-label">Circuit Rompu</span>
            <h3 class="water-title">Recycleur d'Eau — Remise en Circuit</h3>
            <p class="water-desc">
                Le circuit de recyclage est interrompu. Faites pivoter les conduites pour relier
                la <strong>SOURCE</strong> à la <strong>SORTIE</strong> et rétablir le flux d'eau.
            </p>
        </div>

        <div class="water-container">
            <div class="machine-console" id="water-interface">
                <div class="screw top-left"></div>
                <div class="screw top-right"></div>
                <div class="screw bottom-left"></div>
                <div class="screw bottom-right"></div>

                <div class="lcd-screen display-panel">
                    <div id="status-text">ÉTAT : CIRCUIT ROMPU</div>
                    <div class="water-hint">Cliquez sur une conduite pour la faire pivoter de 90°</div>
                </div>

                <div class="pipe-grid" id="pipe-grid"></div>

                <button id="submitBtn" class="hardware-btn submit-btn" style="display:none;">VALIDER LE CIRCUIT</button>
            </div>
        </div>
    </section>
</main>

<script th:inline="none">
    /*
      Grid: 5x5
      Pipe types (by open sides — N=0, E=1, S=2, W=3):
        'I'  : straight  — [N,S] or [E,W]
        'L'  : elbow     — [N,E] / [E,S] / [S,W] / [W,N]
        'T'  : T-shape   — [N,E,S] etc.
        'X'  : cross     — [N,E,S,W]
        'dead': no connection (blocker)

      Each cell: { type, rotation, fixed, isSource, isSink }
      rotation: 0/1/2/3 (×90°)

      Layout (5×5), row by row:
      [0,0]=SOURCE fixed, path winds to [4,4]=SINK fixed
    */

    // ── Pipe definitions ──
    // openings at rotation=0, expressed as set of directions: 0=N,1=E,2=S,3=W
    const PIPE_OPENINGS = {
        'I':    [[0,2],[1,3]],            // rotation 0→N/S, 1→E/W (repeats mod 2)
        'L':    [[0,1],[1,2],[2,3],[3,0]],// rotation 0→N/E, 1→E/S, 2→S/W, 3→W/N
        'T':    [[0,1,2],[1,2,3],[2,3,0],[3,0,1]],
        'X':    [[0,1,2,3]],
        'dead': [[]]
    };

    function getOpenings(type, rotation) {
        const table = PIPE_OPENINGS[type];
        return table[rotation % table.length];
    }

    // ── Grid layout ──
    // Format: [type, rotation, fixed]
    // Solution path: (0,0)→(0,1)→(0,2)→(1,2)→(2,2)→(2,3)→(2,4)→(3,4)→(4,4)
    const GRID_DEF = [
//   col0           col1           col2           col3           col4
        [['L',1,true], ['I',0,false], ['L',2,false], ['dead',0,false],['dead',0,false]], // row0
        [['dead',0,false],['dead',0,false],['I',0,false],['dead',0,false],['dead',0,false]], // row1
        [['dead',0,false],['dead',0,false],['L',1,false],['I',1,false],['L',2,false]], // row2
        [['dead',0,false],['dead',0,false],['dead',0,false],['dead',0,false],['I',0,false]], // row3
        [['dead',0,false],['dead',0,false],['dead',0,false],['dead',0,false],['L',3,true]]  // row4
    ];

    // Source at (row=0,col=0), Sink at (row=4,col=4)
    const SOURCE = {r:0, c:0};
    const SINK   = {r:4, c:4};

    // Randomize rotations of non-fixed cells (but keep solution valid by shuffling only non-path non-fixed)
    // We'll randomize all non-fixed cells on init
    const ROWS = 5, COLS = 5;

    // Build grid state
    let grid = [];
    for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
            const [type, rot, fixed] = GRID_DEF[r][c];
            const isSource = (r === SOURCE.r && c === SOURCE.c);
            const isSink   = (r === SINK.r   && c === SINK.c);
            // Randomize rotation of non-fixed cells
            const initRot = fixed ? rot : Math.floor(Math.random() * 4);
            grid[r][c] = { type, rotation: initRot, fixed, isSource, isSink };
        }
    }

    // ── Opposite direction ──
    function opp(d) { return (d + 2) % 4; }

    // direction → [dr, dc]
    const DIR_DELTA = [[-1,0],[0,1],[1,0],[0,-1]]; // N,E,S,W

    // ── BFS to find flowing cells ──
    function getFlowingCells() {
        const flowing = new Set();
        const queue = [`${SOURCE.r},${SOURCE.c}`];
        flowing.add(`${SOURCE.r},${SOURCE.c}`);

        while (queue.length) {
            const key = queue.shift();
            const [r, c] = key.split(',').map(Number);
            const cell = grid[r][c];
            const openings = getOpenings(cell.type, cell.rotation);

            for (const dir of openings) {
                const [dr, dc] = DIR_DELTA[dir];
                const nr = r + dr, nc = c + dc;
                if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
                const nkey = `${nr},${nc}`;
                if (flowing.has(nkey)) continue;
                const neighbor = grid[nr][nc];
                const nOpenings = getOpenings(neighbor.type, neighbor.rotation);
                if (nOpenings.includes(opp(dir))) {
                    flowing.add(nkey);
                    queue.push(nkey);
                }
            }
        }
        return flowing;
    }

    // ── SVG pipe drawing ──
    function makePipeSVG(type, rotation, flowing, isSource, isSink) {
        const size = 100;
        const mid  = size / 2;
        const hw   = 14; // half pipe width
        const col  = flowing ? '#00ccff' : '#2a3a4a';
        const glow = flowing ? `filter="url(#glow)"` : '';

        let paths = '';

        if (type === 'dead') {
            // Small dot
            paths = `<circle cx="${mid}" cy="${mid}" r="5" fill="${flowing ? col : '#1a2a3a'}"/>`;
        } else {
            const openings = getOpenings(type, rotation);
            // Draw arms from center to each open side
            const ARM = {
                0: `<rect x="${mid-hw}" y="0"       width="${hw*2}" height="${mid+hw}" fill="${col}" ${glow}/>`,  // N
                1: `<rect x="${mid-hw}" y="${mid-hw}" width="${mid+hw+hw}" height="${hw*2}" fill="${col}" ${glow}/>`, // E — center+right
                2: `<rect x="${mid-hw}" y="${mid-hw}" width="${hw*2}" height="${mid+hw+hw}" fill="${col}" ${glow}/>`, // S — center+down
                3: `<rect x="0"        y="${mid-hw}" width="${mid+hw}" height="${hw*2}" fill="${col}" ${glow}/>`,  // W
            };
            // Center fill
            paths += `<rect x="${mid-hw}" y="${mid-hw}" width="${hw*2}" height="${hw*2}" fill="${col}" ${glow}/>`;
            for (const d of openings) paths += ARM[d];
        }

        // Source / sink marker
        let marker = '';
        if (isSource) marker = `<circle cx="${mid}" cy="${mid}" r="8" fill="none" stroke="#00ffaa" stroke-width="2"/>`;
        if (isSink)   marker = `<circle cx="${mid}" cy="${mid}" r="8" fill="none" stroke="#ffaa00" stroke-width="2"/>`;

        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
        </defs>
        <rect width="${size}" height="${size}" fill="transparent"/>
        <g class="pipe-line">${paths}</g>
        ${marker}
    </svg>`;
    }

    // ── Render grid ──
    const gridEl     = document.getElementById('pipe-grid');
    const statusText = document.getElementById('status-text');
    const submitBtn  = document.getElementById('submitBtn');
    const waterIface = document.getElementById('water-interface');

    function render() {
        const flowing = getFlowingCells();
        const won = flowing.has(`${SINK.r},${SINK.c}`);

        gridEl.innerHTML = '';

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = grid[r][c];
                const key  = `${r},${c}`;
                const isFlowing = flowing.has(key);

                const div = document.createElement('div');
                div.className = 'pipe-cell';
                if (isFlowing)    div.classList.add('flowing');
                if (cell.isSource) div.classList.add('source', 'fixed');
                if (cell.isSink)   div.classList.add('sink',   'fixed');
                if (cell.fixed)    div.classList.add('fixed');

                div.innerHTML = makePipeSVG(cell.type, cell.rotation, isFlowing, cell.isSource, cell.isSink);

                if (cell.isSource) div.innerHTML += '<span class="cell-label">SOURCE</span>';
                if (cell.isSink)   div.innerHTML += '<span class="cell-label">SORTIE</span>';

                if (!cell.fixed) {
                    div.addEventListener('click', () => {
                        cell.rotation = (cell.rotation + 1) % 4;
                        render();
                    });
                }

                gridEl.appendChild(div);
            }
        }

        if (won) {
            statusText.innerText = 'ÉTAT : CIRCUIT RÉTABLI';
            statusText.style.color = '#00ccff';
            waterIface.classList.add('success');
            submitBtn.style.display = 'block';
        } else {
            statusText.innerText = 'ÉTAT : CIRCUIT ROMPU';
            statusText.style.color = '#ff3344';
            waterIface.classList.remove('success');
            submitBtn.style.display = 'none';
        }
    }

    render();

    // ── Submit ──
    submitBtn.addEventListener('click', () => {
        const token  = document.querySelector('meta[name="_csrf"]').content;
        const header = document.querySelector('meta[name="_csrf_header"]').content;
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId  = urlParams.get('deviceId');

        const signalParent = () => {
            console.log("Circuit eau rétabli, envoi du signal pour le device:", deviceId);
            window.parent.postMessage({ type: 'MINIGAME_WIN', deviceId: deviceId }, '*');
        };

        fetch('/user/updateExp?amount=50', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', [header]: token }
        })
            .then(() => signalParent())
            .catch(err => { console.error("Erreur réseau XP:", err); signalParent(); });
    });
</script>

</body>
</html>
