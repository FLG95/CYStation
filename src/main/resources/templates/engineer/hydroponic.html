<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module d'Ingénierie - Analyse Hydroponique</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/engineer/hydroponic.css}">
</head>
<body>

<main class="cnes-layout">
    <section class="cnes-section hydroponic-section">
        <div class="section-header hydroponic-section-header">
            <h2>Ingénierie & Biologie</h2>
        </div>

        <div class="hydroponic-header-info">
            <span class="warning-label">Saisie de Commande Requise</span>
            <h3 class="hydroponic-title">Calibration des Nutriments</h3>
            <p class="hydroponic-desc">Recopiez exactement la séquence de calibration affichée par le terminal pour
                valider l'analyse hydroponique du secteur B.</p>
        </div>

        <div class="hydroponic-container">
            <div class="machine-console" id="hydroponic-interface">
                <div class="screw top-left"></div>
                <div class="screw top-right"></div>
                <div class="screw bottom-left"></div>
                <div class="screw bottom-right"></div>

                <div class="lcd-screen display-panel">
                    <div id="status-text">ÉTAT : EN ATTENTE DE SAISIE</div>
                    <div class="target-display">SÉQUENCE CIBLE : <br><span id="target-password">CHARGEMENT...</span>
                    </div>
                </div>

                <div class="terminal-input-group">
                    <label class="engraved-label" for="password-input">ENTRÉE TERMINAL</label>
                    <input type="text" id="password-input" class="terminal-input"
                           placeholder="Saisissez la séquence ici..." autocomplete="off">
                </div>

                <button id="submitBtn" class="hardware-btn">TRANSMETTRE LES DONNÉES</button>
            </div>
        </div>
    </section>
</main>


<script>
    const targetPasswordDisplay = document.getElementById('target-password');
    const passwordInput = document.getElementById('password-input');
    const submitBtn = document.getElementById('submitBtn');
    const statusText = document.getElementById('status-text');
    const hydroponicInterface = document.getElementById('hydroponic-interface');

    const sequences = [
        "H2O-NUTR-88X", "BIO-SYNC-A42", "PH-LEVEL-7.4", "OXYGEN-FLUX-9", "ZETA-PLANT-00"
    ];

    const targetSequence = sequences[Math.floor(Math.random() * sequences.length)];
    targetPasswordDisplay.innerText = targetSequence;

    function victory() {
        hydroponicInterface.classList.remove('error');
        hydroponicInterface.classList.add('success');

        passwordInput.disabled = true;
        if (submitBtn) submitBtn.style.display = "block";

        statusText.innerText = "ÉTAT : CALIBRATION RÉUSSIE";
        statusText.style.color = "#00ff00";
        statusText.style.textShadow = "0 0 8px #00ff00";
    }

    passwordInput.addEventListener('input', () => {
        if (passwordInput.value === targetSequence) {
            victory();
        } else if (targetSequence.startsWith(passwordInput.value)) {
            hydroponicInterface.classList.remove('error');
        } else {
            hydroponicInterface.classList.add('error');
        }
    });

    if (submitBtn) {
        submitBtn.addEventListener('click', () => {
            const token = document.querySelector('meta[name="_csrf"]').content;
            const header = document.querySelector('meta[name="_csrf_header"]').content;

            const urlParams = new URLSearchParams(window.location.search);
            const deviceId = urlParams.get('deviceId');

            fetch('/user/updateExp?amount=20', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [header]: token
                }
            })
                .then(res => {
                    console.log("XP OK ou traité, envoi du signal de fermeture...");

                    window.parent.postMessage({
                        type: 'MINIGAME_WIN',
                        deviceId: deviceId
                    }, '*');
                })
                .catch(err => {
                    console.error("Erreur réseau, on force quand même la fermeture", err);
                    window.parent.postMessage({
                        type: 'MINIGAME_WIN',
                        deviceId: deviceId
                    }, '*');
                });
        });
    }
</script>

</body>
</html>
